version: 1

project:
  name: ""
  root: .
  layout: default

sources:
  frontend: ./frontend
  backend: ./backend

qa:
  cases: ./qa/cases
  changes: ./qa/changes

tests:
  root: ./tests
  api: ./tests/api
  e2e: ./tests/e2e
  fixtures: ./tests/fixtures
  helpers: ./tests/helpers
  reports: ./tests/reports

frameworks:
  api:
    enabled: true
    name: pytest
  e2e:
    enabled: true
    name: playwright

workflow:
  primary_runner: skill
  agent: opencode

mcp:
  enabled: false

generation:
  prd_input_mode: prompt
  e2e:
    default_pom: false
    locator_priority:
      - role
      - label
      - testid
      - css
  api:
    prefer_existing_fixtures: true

execution:
  entry: cli
  policy_file: ./.aws/execution-policy.json
  ci_must_use_cli: true
  self_healing:
    mode: proposal-only
    allow_assertion_change: false
    allow_product_code_change: false
    allow_auto_merge: false

review:
  require_case_review: true
  require_subplan_review: true
  require_fix_proposal_review: true

archive:
  enable_trace_check: true
  regression_default: true

performance:
  enabled: true
  base_url: http://localhost:9999
  default_load:
    users: 5
    spawn_rate: 1
    run_time_s: 10
