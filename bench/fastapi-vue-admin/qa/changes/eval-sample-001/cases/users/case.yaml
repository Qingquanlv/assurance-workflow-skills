      - "数据库中存在用户名 qa_create_001 的用户"
      - "新用户的角色集合包含目标角色"
      - "新用户的密码哈希值不等于明文 Test@1234（密码已加密）"
    postconditions:
      - "测试用户已被删除"
    edge_cases:
      - "TC-USER-021 覆盖 email 重复"
      - "TC-USER-022 覆盖必填字段缺失"
    related_cases: ["TC-USER-021", "TC-USER-022", "TC-USER-030"]
