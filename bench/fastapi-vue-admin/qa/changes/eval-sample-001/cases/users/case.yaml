    module: users
    requirement_id: "REQ-USER-CREATE-OK"
    feature_name: "创建用户并绑定角色"
    test_condition_id: "COND-USER-CREATE-001"
    design_technique: use_case
    tags: [users, create, role, smoke]
    objective: "验证管理员创建用户时可以同时绑定角色，且密码经过加密存储。"
    summary: "构造合法用户输入并附带至少一个角色 ID，创建后用户应存在且角色已绑定。"
    preconditions:
      - "管理员凭证可用"
      - "系统中至少存在一个可绑定的角色"
    test_data:
      - "新用户输入：唯一的用户名 qa_create_001，唯一邮箱 qa_create_001@test.local，初始密码 Test@1234，绑定一个有效角色 ID"
    steps:
      - "数据准备：记录一个可绑定的角色 ID"
      - "管理员调用创建用户接口提交输入"
      - "接收响应"
      - "数据校验：通过 ORM 查询新用户存在且 roles 包含目标角色"
      - "清理测试用户"
