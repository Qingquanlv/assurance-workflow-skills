  - case_id: "TC-USER-002"
    title: "用户列表 - 按用户名模糊搜索"
    status: draft
    priority: P1
    severity: major
    type: API
    module: users
    requirement_id: "REQ-USER-LIST-SEARCH"
    feature_name: "用户列表按用户名搜索"
    test_condition_id: "COND-USER-LIST-002"
    design_technique: equivalence_partitioning
    tags: [users, list, search]
    objective: "验证用户列表按用户名模糊搜索时仅返回匹配数据。"
    summary: "构造一个唯一用户名的测试用户后，按该用户名模糊搜索，期望仅返回该条记录。"
    preconditions:
      - "管理员凭证可用"
      - "测试期间数据库中预置一个用户名唯一的测试用户"
    test_data:
      - "测试用户：用户名为唯一标识 qa_user_search"
      - "查询参数：用户名包含 qa_user_search"
    steps:
      - "数据准备：创建测试用户 qa_user_search"
      - "管理员发起用户列表查询，附带用户名搜索条件"
      - "接收响应"
      - "测试结束后清理测试用户"
    assertions:
      - "响应表示成功状态"
      - "返回结果中仅包含 1 条记录"
      - "记录的用户名等于 qa_user_search"
    postconditions:
      - "测试用户已被删除"
    edge_cases:
      - "搜索关键字不存在时返回空列表（隐式覆盖于此 case 的反向）"
    related_cases: ["TC-USER-001"]
    risk:
      likelihood: 3
      impact: 3
      level: medium
      rationale: "搜索条件错误会影响管理员排查问题，但有备用全量列表降级路径。"
    regression:
      candidate: true
      tier: regression
      selection_reason: [contract_boundary]
      maintenance_rule: keep_until_feature_deprecated
      rationale: "搜索过滤是高频操作，P1 回归保障。"
    automation:
      required: true
      framework: pytest
      suggested_file: tests/api/test_users_api.py
