      - "管理员发起用户列表查询请求，使用默认分页参数"
      - "接收并解析响应"
    assertions:
      - "响应表示成功状态"
      - "返回的用户列表至少包含 1 条记录"
      - "返回的用户列表中至少有一条用户名为 admin 的记录"
      - "返回结构中分页字段（页码、每页数量、总数）与请求一致"
      - "响应数据中不包含 password 字段"
    postconditions:
      - "无副作用"
    edge_cases: []
    related_cases: ["TC-USER-002", "TC-USER-003"]
    risk:
      likelihood: 2
      impact: 5
      level: high
      rationale: "用户列表是管理员访问其它子操作的入口，回归失败将阻断整条用户管理使用链路。"
    regression:
      candidate: true
