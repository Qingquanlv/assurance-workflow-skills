  - case_id: "TC-USER-001"
    title: "用户列表 - 默认分页加载"
    status: draft
    priority: P0
    severity: critical
    type: API
    module: users
    requirement_id: "REQ-USER-LIST-DEFAULT"
    feature_name: "用户列表分页"
    test_condition_id: "COND-USER-LIST-001"
    design_technique: use_case
    tags: [users, list, pagination, smoke]
    objective: "验证管理员按默认分页参数获取用户列表，响应中包含 admin 账号且不返回 password 字段。"
    summary: "以管理员身份调用用户列表查询，期望返回首页数据并隐藏密码字段。"
    preconditions:
      - "后端服务已启动并可访问"
      - "数据库存在默认 admin 账号"
      - "管理员已通过登录获得有效访问凭证"
    test_data:
      - "查询参数：第 1 页，每页 10 条"
