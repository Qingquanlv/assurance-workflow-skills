  - case_id: "TC-ROLE-010"
    title: "更新角色权限 - 重写 menu_ids 旧绑定不再保留"
    status: draft
    priority: P0
    severity: critical
    type: API
    module: roles
    requirement_id: "REQ-ROLE-AUTH-REWRITE-MENUS"
    feature_name: "角色权限菜单重写"
    test_condition_id: "TC-COND-ROLE-AUTH-002"
    design_technique: state_transition
    objective: "验证保存角色权限接口提交 menu_ids 时旧菜单绑定被清除，仅保留本次入参的菜单。"
    tags: [roles, authorized, post, rewrite, security]
    summary: "为角色绑定 menu_A，再用 menu_B 通过保存角色权限接口重写，期望最终 menus 仅含 menu_B（不含 menu_A）。"
    preconditions:
      - "管理员凭证可用"
      - "数据库中存在两个不同 menu：menu_A_id 与 menu_B_id（fact baseline 阶段确认稳定 ID）"
      - "预置测试角色，并通过保存角色权限接口先绑定 menu_A_id（apis 入参为空数组）"
    test_data:
      - "测试角色 ID"
      - "menu_A_id（旧绑定）"
      - "menu_B_id（新绑定，与 menu_A_id 不同）"
    steps:
      - "数据准备：创建测试角色 + 绑定 menu_A_id"
      - "管理员调用保存角色权限接口，提交 id=role_id, menu_ids=[menu_B_id], api_infos=[]"
      - "接收响应"
      - "再次调用查看角色权限接口读取最终状态"
      - "清理测试角色"
    assertions:
      - "保存响应表示成功状态"
      - "查看角色权限接口响应中 menus 包含 menu_B_id"
      - "查看角色权限接口响应中 menus 不包含 menu_A_id（确认重写而非追加）"
    postconditions:
      - "测试角色已被删除"
    edge_cases:
      - "若查看响应同时含 menu_A 与 menu_B 应判定 product issue（权限蠕变）"
