  - case_id: "TC-ROLE-200"
    title: "角色接口 schema-based 健壮性扫描"
    status: draft
    priority: P1
    severity: major
    type: Fuzz
    module: roles
    requirement_id: "REQ-ROLE-FUZZ"
    feature_name: "角色接口异常输入健壮性"
    test_condition_id: "TC-COND-ROLE-FUZZ-001"
    design_technique: fuzz
    objective: "验证 role 模块所有端点在 OpenAPI schema 范围内的随机异常输入下不会出现 5xx 崩溃或 schema 违规。"
    tags: [roles, fuzz, schemathesis, robustness]
    summary: "schemathesis 从后端 OpenAPI schema 抽取 role 模块端点，自动生成 schema-based 异常输入（必填缺失、类型反转、超长字符串、空数组、负数 ID 等组合），对 role 模块所有端点执行健壮性扫描。"
    preconditions:
      - "后端服务已启动并对外暴露 OpenAPI schema 文档"
      - "管理员凭证可用并能透传给 schemathesis 作为认证 header"
      - "fuzz 数据生产期间允许少量非清洁角色记录残留（teardown 通过 name 前缀兜底清理）"
    test_data:
      - "OpenAPI schema 由后端服务暴露的 schema 文档提供（具体路径在 fuzz plan 阶段确定）"
      - "目标端点：role 模块所有端点（list, get, create, update, delete, authorized-get, authorized-post 共 7 个特性）"
      - "执行预算：每端点 ≤ 50 examples（具体值由 fuzz plan 阶段确定）"
    steps:
      - "schemathesis 加载后端 OpenAPI schema 并过滤出 role 模块的端点"
      - "对每个目标端点运行 schema-based 健壮性扫描（携带管理员认证 header）"
      - "收集每次响应的 status_code 与 schema 校验结果"
      - "扫描结束后通过 ORM 清理 name 前缀为 qa-role- / 残留的 fuzz 角色"
    assertions:
      - "扫描产出 0 个 server_error（HTTP 5xx）"
      - "扫描产出 0 个 schema_violation（响应不符合 OpenAPI schema 定义）"
      - "schemathesis 报告中本批次每个端点都至少被命中 1 次"
    postconditions:
      - "fuzz 期间残留的角色记录已通过前缀清理"
    edge_cases:
      - "若发现 5xx 在 fuzz-result.json 中标记并由 inspect 阶段分类为 product issue"
      - "若发现 schema_violation 同样由 inspect 阶段分类为 product issue"
    related_cases: ["TC-ROLE-005", "TC-ROLE-006", "TC-ROLE-010", "TC-ROLE-011"]
    risk:
      likelihood: 3
      impact: 4
      level: high
      rationale: "RoleUpdateMenusApis.api_infos 是 list[dict] 弱类型，异常输入容易触发 add(None) 崩溃；fuzz 是最经济的暴露手段。"
    regression:
      candidate: true
      tier: regression
      selection_reason: ["fuzz robustness"]
      maintenance_rule: "角色接口 schema 变更或控制器实现变更后必跑"
      rationale: "守护接口对异常输入的边界稳定性。"
    automation:
      required: true
      framework: schemathesis
      status: planned
      confirmed_by: null
      confirmed_at: null
      fuzz:
        endpoints:
          - role-list
          - role-get
          - role-create
          - role-update
          - role-delete
          - role-authorized-get
          - role-authorized-post
        expectations:
          - no_5xx
          - schema_compliant
          - all_endpoints_hit_at_least_once
    trace:
      proposal: "qa/changes/20260615-role-mgmt/proposal.md"
      requirement: "REQ-ROLE-FUZZ"

