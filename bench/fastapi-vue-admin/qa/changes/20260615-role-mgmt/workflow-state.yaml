      did_not_override_cli_classification: true
      no_edits_to_failure_analysis_json: true
      no_edits_to_fix_proposal_json: true
      action_taken: "documented as not_applicable in healing/e2e-apply-summary.{json,md} with raw-log line evidence; user confirmed via question prompt"
