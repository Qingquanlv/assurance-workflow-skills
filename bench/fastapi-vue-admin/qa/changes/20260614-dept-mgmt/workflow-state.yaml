schema_version: "1.0"
change_id: "20260614-dept-mgmt"
module: depts

execution_mode: inline
subagent_skill_inheritance: disabled

runtime_parameters:
  run_mode: full
  test_types: api,e2e
  max_case_fix_attempts: 2
  max_plan_fix_attempts: 2
  force_continue: false
  run_dashboard: false
  run_tests: true
  max_healing_attempts: 2
  auto_archive: false
  auto_archive_with_fallback: false
  e2e_framework: python-playwright

subagents:
  used: true
  purpose:
    - source_exploration_only
  loaded_skills: false
  attempted_skill_loading: false
  attempted_phase_execution: false
  affected_gates: false

phases:
  skill_registry_check:
    status: pass
    checked_skills:
      - aws-case-design
      - aws-case-reviewer
      - aws-case-fixer
      - aws-api-plan
      - aws-e2e-plan
      - aws-api-plan-reviewer
      - aws-e2e-plan-reviewer
      - aws-api-plan-fixer
      - aws-e2e-plan-fixer
      - aws-api-codegen
      - aws-e2e-codegen
      - aws-run
      - aws-inspect
      - aws-archive
    healing_skills_checked:
      - aws-fix-proposal
      - aws-api-codegen-fixer
      - aws-e2e-codegen-fixer

  case_design:
    status: pending
    outputs:
      - .qa.yaml
      - proposal.md
      - cases/depts/case.yaml

  case_review:
    status: pending
    gate_file: review/case-review.json
    fix_attempts: []

  fact_baseline:
    status: pending
    source: null
    file: facts/fact-baseline.json

  api_plan:
    status: pending
    outputs:
      - plans/api-plan.md
      - plans/api-test-data-plan.md
      - plans/api-codegen-plan.md

  e2e_plan:
    status: pending
    outputs:
      - plans/e2e-plan.md
      - plans/e2e-test-data-plan.md
      - plans/e2e-codegen-plan.md

  api_plan_review:
    status: pending
    stale_reason: null
    gate_file: review/api-plan-review.json
    fix_attempts: []

  e2e_plan_review:
    status: pending
    stale_reason: null
    gate_file: review/plan-review.json
    fix_attempts: []

  api_codegen:
    status: pending
    stop_reason: null
    needs_patch_reason: null
    review_gate_file: review/api-plan-review.json

  e2e_codegen:
    status: pending
    stop_reason: null
    needs_patch_reason: null
    review_gate_file: review/plan-review.json

  execution:
    status: pending

  inspect:
    status: pending
    inspect_mode: null
    classification_performed: false

  healing:
    status: pending
    attempts: []

  archive:
    status: pending

gates:
  data_knowledge:
    status: present
    decision: pass
  healing_available: true

known_product_issues: []

agent_warnings:
  - id: OPENCODE-SKILL-RESOLUTION-001
    severity: medium
    title: OpenCode subagent skill inheritance is disabled
    impact:
      - no skill-based background subagent execution
      - workflow phases run inline
    workaround:
      - use file-based phase contracts
      - use document-driven subagents only if parallelism is needed
    status: acknowledged

  - id: AWS-SUBAGENT-EXPLORATION-ONLY
    severity: info
    title: Subagents used for source exploration only
    detail: >
      Three explore agents were invoked BEFORE Phase 0 for source/structure
      exploration of backend dept module, frontend dept page, and existing QA
      conventions. No AWS skill was loaded by any subagent. No gate artifact
      was produced by a subagent. All AWS phases execute inline in the primary
      agent.
    status: acknowledged
