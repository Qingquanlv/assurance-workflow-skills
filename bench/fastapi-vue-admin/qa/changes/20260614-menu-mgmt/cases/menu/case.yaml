schema_version: "1.0"

added:
  - case_id: TC-MENU-001
    title: 创建顶级目录菜单成功
    status: draft
    priority: P0
    severity: blocker
    type: API
    module: menu
    requirement_id: REQ-MENU-MGMT
    feature_name: menu-management
    test_condition_id: COND-MENU-001
    design_technique: use_case
    tags:
      - create
      - happy-path
      - tree-root

    objective: 验证可在系统中创建一个 parent_id=0 的顶级目录菜单，且创建后可在菜单列表中看到该节点。
    summary: >
      已认证管理员通过创建接口提交合法的顶级目录菜单数据时，系统应返回创建成功，且后续列表接口能够看到该菜单节点。

    risk:
      likelihood: 4
      impact: 4
      level: high
      rationale: 创建顶级菜单是构建整棵菜单树的入口，失败将阻塞动态路由和权限初始化。

    preconditions:
      - 系统中存在一个具有菜单管理权限的管理员账户
      - 管理员已登录并持有有效 access_token

    test_data:
      - 一个新的菜单名称（如 qa-test-top-{随机后缀}），避免与已有菜单冲突
      - menu_type 设为目录（catalog）
      - parent_id 设为 0
      - order 设为非零正整数

    steps:
      - 准备一份合法的顶级目录菜单数据
      - 携带管理员 access_token 调用菜单创建接口
      - 调用菜单列表接口
      - 在返回的菜单树根节点列表中查找刚刚创建的菜单

    assertions:
      - 创建接口返回 HTTP 200
      - 创建接口业务码为 200，msg 表示创建成功
      - 列表接口返回的根节点列表中包含新创建的菜单
      - 新菜单的 parent_id 为 0
      - 新菜单的 children 字段为空列表

    postconditions:
      - 测试结束后通过删除接口清理新创建的菜单

    edge_cases:
      - 重复 path 的菜单创建（项目当前未限制，本 case 不验证）
      - 超长 name 或非法字符（属通用字段校验，不在本 case 覆盖）

    related_cases:
      - TC-MENU-002
      - TC-MENU-003

    automation:
      required: true
      target: API
      framework: pytest
      suggested_file: tests/api/test_menu_api.py
      status: planned

    regression:
      candidate: true
      tier: smoke
      selection_reason:
        - critical_user_journey
        - newly_added_feature
      maintenance_rule: keep_until_feature_deprecated
      rationale: 顶级菜单创建是动态路由和权限体系的入口，必须始终在 smoke 套件中保护。

    trace:
      change_reason: 菜单模块首次 QA 初始化，建立创建路径基线。

  - case_id: TC-MENU-002
    title: 在已存在父菜单下创建子菜单成功
    status: draft
    priority: P0
    severity: critical
    type: API
    module: menu
    requirement_id: REQ-MENU-MGMT
    feature_name: menu-management
    test_condition_id: COND-MENU-002
    design_technique: use_case
    tags:
      - create
      - tree-child
      - happy-path

    objective: 验证可以在已存在的父菜单下创建子菜单，子菜单挂载到正确父节点。
    summary: >
      已认证管理员针对已存在的父菜单 ID 提交子菜单创建请求时，系统应返回创建成功，且列表接口中该子菜单出现在父菜单的 children 中。

    risk:
      likelihood: 4
      impact: 4
      level: high
      rationale: 子菜单挂载关系错误将导致菜单树结构错乱、动态路由失效。

    preconditions:
      - 系统中存在一个具有菜单管理权限的管理员账户
      - 管理员已登录并持有有效 access_token
      - 系统中存在一个已创建的顶级目录菜单作为父节点

    test_data:
      - 通过 fixture 预先创建一个顶级目录作为父菜单
      - 一个新的子菜单名称（qa-test-child-{随机后缀}）
      - parent_id 设为父菜单的真实 ID
      - menu_type 设为菜单（menu）

    steps:
      - 通过 fixture 准备一个顶级父菜单并记录其 ID
      - 准备一份子菜单数据，parent_id 指向父菜单 ID
      - 携带管理员 access_token 调用菜单创建接口
      - 调用菜单列表接口
      - 在父菜单的 children 数组中查找刚刚创建的子菜单

    assertions:
      - 创建接口返回 HTTP 200
      - 创建接口业务码为 200
      - 列表接口返回的树中，父菜单存在
      - 父菜单的 children 数组包含新创建的子菜单
      - 新子菜单的 parent_id 等于父菜单 ID

    postconditions:
      - 先删除子菜单再删除父菜单完成清理

    edge_cases:
      - 父菜单不存在时创建子菜单（项目当前不校验，本 case 不验证）
      - 跨多层级的孙子菜单创建（属 TC-MENU-003 间接覆盖）

    related_cases:
      - TC-MENU-001
      - TC-MENU-003
      - TC-MENU-005

    automation:
      required: true
      target: API
      framework: pytest
      suggested_file: tests/api/test_menu_api.py
      status: planned

    regression:
      candidate: true
      tier: smoke
      selection_reason:
        - critical_user_journey
        - newly_added_feature
      maintenance_rule: keep_until_feature_deprecated
      rationale: 子菜单挂载是 RBAC 菜单树构建的核心路径，P0 + 高风险必须进 smoke。

    trace:
      change_reason: 菜单模块首次 QA 初始化，建立子菜单挂载路径基线。

  - case_id: TC-MENU-003
    title: 列表接口按 order 升序返回多级菜单树
    status: draft
    priority: P0
    severity: critical
    type: API
    module: menu
    requirement_id: REQ-MENU-MGMT
    feature_name: menu-management
    test_condition_id: COND-MENU-003
    design_technique: use_case
    tags:
      - list
      - tree
      - sort

    objective: 验证菜单列表接口返回的树中，同级菜单按 order 字段升序排列，且 parent_id 嵌套关系正确。
    summary: >
      已认证管理员调用菜单列表接口时，系统应返回多级嵌套结构，每一级内部按 order 升序排列。

    risk:
      likelihood: 4
      impact: 4
      level: high
      rationale: 列表是前端动态路由的数据来源，顺序错误会导致用户菜单展现错乱。

    preconditions:
      - 系统中存在一个具有菜单管理权限的管理员账户
      - 管理员已登录并持有有效 access_token

    test_data:
      - 通过 fixture 创建 1 个顶级父菜单 P 与 2 个子菜单 C1、C2
      - 父菜单 P 的 order 设为某个值（如 100）
      - 子菜单 C1 的 order 设为 20，C2 的 order 设为 10（C2 应排在 C1 之前）
      - 全部前缀使用 qa-test- 便于清理

    steps:
      - 通过 fixture 创建一个父菜单 P 和两个子菜单 C1（order=20）、C2（order=10）
      - 携带管理员 access_token 调用菜单列表接口
      - 在响应中找到父菜单 P
      - 检查 P 的 children 数组中 C2 的位置在 C1 之前

    assertions:
      - 列表接口返回 HTTP 200
      - 响应中存在父菜单 P
      - 父菜单 P 的 children 数组按 order 升序排列（C2 在前，C1 在后）
      - 父菜单 P 的 children 中每一项的 parent_id 等于 P 的 ID

    postconditions:
      - 先删除两个子菜单再删除父菜单完成清理

    edge_cases:
      - 多个菜单使用相同 order 值的稳定性（不在本 case 验证）
      - 超过 5 层深度的嵌套（不在本 case 验证）

    related_cases:
      - TC-MENU-001
      - TC-MENU-002
      - TC-MENU-005

    automation:
      required: true
      target: API
      framework: pytest
      suggested_file: tests/api/test_menu_api.py
      status: planned

    regression:
      candidate: true
      tier: smoke
      selection_reason:
        - critical_user_journey
        - high_risk
      maintenance_rule: keep_until_feature_deprecated
      rationale: 树结构 + order 排序是菜单模块核心契约，必须进 smoke 套件。

    trace:
      change_reason: 菜单模块首次 QA 初始化，建立列表树结构与排序基线。

  - case_id: TC-MENU-004
    title: 修改菜单基础字段成功
    status: draft
    priority: P1
    severity: major
    type: API
    module: menu
    requirement_id: REQ-MENU-MGMT
    feature_name: menu-management
    test_condition_id: COND-MENU-004
    design_technique: use_case
    tags:
      - update
      - happy-path

    objective: 验证可修改菜单的 name、icon、order 等基础字段并持久化。
    summary: >
      已认证管理员通过更新接口提交菜单 ID + 新字段值时，系统应返回更新成功，且后续 get 接口返回的字段已更新。

    risk:
      likelihood: 3
      impact: 3
      level: medium
      rationale: 字段更新是常规 CRUD 行为，影响面有限。

    preconditions:
      - 系统中存在一个具有菜单管理权限的管理员账户
      - 管理员已登录并持有有效 access_token
      - 已有一个 fixture 创建的顶级菜单可供修改

    test_data:
      - fixture 创建的菜单 ID
      - 新的 name（不与已有菜单冲突）
      - 新的 order 值
      - 新的 icon 字符串

    steps:
      - 通过 fixture 创建一个顶级菜单并记录其 ID
      - 准备包含该 ID 与新字段值的更新请求体
      - 携带管理员 access_token 调用菜单更新接口
      - 携带 menu_id 调用菜单 get 接口
      - 比较返回字段与提交字段

    assertions:
      - 更新接口返回 HTTP 200
      - 更新接口业务码为 200
      - get 接口返回的菜单 name 等于新 name
      - get 接口返回的菜单 order 等于新 order
      - get 接口返回的菜单 icon 等于新 icon

    postconditions:
      - 测试结束后删除该菜单完成清理

    edge_cases:
      - 更新不存在的菜单 ID（应当报错，不在本 case 验证）
      - 部分字段更新 vs 全字段更新差异（项目实现是覆盖更新，不展开）

    related_cases:
      - TC-MENU-001
      - TC-MENU-005

    automation:
      required: true
      target: API
      framework: pytest
      suggested_file: tests/api/test_menu_api.py
      status: planned

    regression:
      candidate: true
      tier: regression
      selection_reason:
        - newly_added_feature
      maintenance_rule: keep_until_feature_deprecated
      rationale: P1 字段更新场景，进常规 regression 套件即可，无需 smoke。

    trace:
      change_reason: 菜单模块首次 QA 初始化，建立字段更新基线。

  - case_id: TC-MENU-005
    title: 修改 parent_id 实现菜单移动到新父节点
    status: draft
    priority: P1
    severity: critical
    type: API
    module: menu
    requirement_id: REQ-MENU-MGMT
    feature_name: menu-management
    test_condition_id: COND-MENU-005
    design_technique: state_transition
    tags:
      - update
      - tree-move
      - parent-change

    objective: 验证将一个子菜单的 parent_id 修改为另一个父菜单 ID 后，列表接口中该子菜单挂载到新父节点下。
    summary: >
      已认证管理员将子菜单 C 的 parent_id 从 P1 修改为 P2 后，列表接口应在 P2 的 children 中看到 C，P1 的 children 中不再有 C。

    risk:
      likelihood: 3
      impact: 4
      level: high
      rationale: 移动节点直接修改树结构，错误的迁移会导致权限继承链断裂。

    preconditions:
      - 系统中存在一个具有菜单管理权限的管理员账户
      - 管理员已登录并持有有效 access_token
      - 已有 fixture 创建的两个顶级父菜单 P1 与 P2，以及挂在 P1 下的一个子菜单 C

    test_data:
      - fixture 提供 P1、P2、C 的 ID
      - 更新请求中 C 的 parent_id 改为 P2 的 ID

    steps:
      - 通过 fixture 创建两个顶级父菜单 P1、P2 与一个挂在 P1 下的子菜单 C
      - 调用列表接口确认 C 当前在 P1 的 children 中
      - 携带 admin access_token 调用更新接口，将 C 的 parent_id 改为 P2 的 ID
      - 再次调用列表接口
      - 检查 P1 的 children 与 P2 的 children

    assertions:
      - 更新接口返回 HTTP 200 且业务码为 200
      - 更新后列表中 P1 的 children 不再包含 C
      - 更新后列表中 P2 的 children 包含 C
      - C 的 parent_id 等于 P2 的 ID

    postconditions:
      - 删除 C、P2、P1 完成清理（按当前父子关系顺序）

    edge_cases:
      - 把 parent_id 改为不存在的菜单 ID（不在本 case 验证）
      - 把 parent_id 改为自身或后代（属 TC-MENU-008 覆盖）

    related_cases:
      - TC-MENU-002
      - TC-MENU-008

    automation:
      required: true
      target: API
      framework: pytest
      suggested_file: tests/api/test_menu_api.py
      status: planned

    regression:
      candidate: true
      tier: regression
      selection_reason:
        - high_risk
        - newly_added_feature
      maintenance_rule: keep_until_feature_deprecated
      rationale: 节点迁移属于状态迁移类，建议进 regression 套件长期保护。

    trace:
      change_reason: 菜单模块首次 QA 初始化，建立树节点迁移基线。

  - case_id: TC-MENU-006
    title: 删除有子菜单的菜单时返回业务失败
    status: draft
    priority: P0
    severity: blocker
    type: API
    module: menu
    requirement_id: REQ-MENU-MGMT
    feature_name: menu-management
    test_condition_id: COND-MENU-006
    design_technique: negative
    tags:
      - delete
      - business-rule
      - negative

    objective: 验证当尝试删除一个仍有子菜单的菜单时，系统按业务规则拒绝删除并保留该菜单。
    summary: >
      已认证管理员对一个仍存在子菜单的父菜单调用删除接口时，系统应返回业务失败信息，且后续列表中该父菜单仍然存在。

    risk:
      likelihood: 3
      impact: 4
      level: high
      rationale: 错误删除带子菜单的父级会孤立子节点，破坏整棵菜单树。

    preconditions:
      - 系统中存在一个具有菜单管理权限的管理员账户
      - 管理员已登录并持有有效 access_token
      - 已有 fixture 创建的父菜单 P 和挂在其下的子菜单 C

    test_data:
      - fixture 提供 P 与 C 的 ID
      - 删除请求 id 设为 P 的 ID

    steps:
      - 通过 fixture 创建一个父菜单 P 和一个子菜单 C
      - 携带 admin access_token 调用菜单删除接口，id 传 P 的 ID
      - 调用菜单列表接口
      - 在列表中查找 P

    assertions:
      - 删除接口返回 HTTP 200
      - 删除接口的业务码为非 200（业务失败）或 msg 中包含 "Cannot delete a menu with child menus"
      - 列表中 P 仍然存在
      - 列表中 P 的 children 仍包含 C

    postconditions:
      - 测试结束后先删除 C 再删除 P 完成清理

    edge_cases:
      - 多层嵌套（父+子+孙）下删除中间层（不在本 case 验证）
      - 同时删除多个有子的菜单（不在本 case 验证）

    related_cases:
      - TC-MENU-007
      - TC-MENU-002

    automation:
      required: true
      target: API
      framework: pytest
      suggested_file: tests/api/test_menu_api.py
      status: planned

    regression:
      candidate: true
      tier: smoke
      selection_reason:
        - critical_user_journey
        - high_risk
      maintenance_rule: keep_until_feature_deprecated
      rationale: 删除业务规则是阻断错误删除的最后防线，必须进 smoke 套件。

    trace:
      change_reason: 菜单模块首次 QA 初始化，建立删除业务规则基线。

  - case_id: TC-MENU-007
    title: 删除叶子菜单成功
    status: draft
    priority: P1
    severity: major
    type: API
    module: menu
    requirement_id: REQ-MENU-MGMT
    feature_name: menu-management
    test_condition_id: COND-MENU-007
    design_technique: use_case
    tags:
      - delete
      - happy-path
      - leaf

    objective: 验证可成功删除一个没有子菜单的叶子菜单，删除后无法通过 get 接口取回。
    summary: >
      已认证管理员对一个没有子菜单的叶子菜单调用删除接口时，系统应返回删除成功，且 get 接口针对该 ID 返回失败 / 不存在。

    risk:
      likelihood: 3
      impact: 3
      level: medium
      rationale: 标准 CRUD 删除路径，影响面限于自身节点。

    preconditions:
      - 系统中存在一个具有菜单管理权限的管理员账户
      - 管理员已登录并持有有效 access_token
      - 已有 fixture 创建的叶子菜单 L（无 children）

    test_data:
      - fixture 提供 L 的 ID
      - 删除请求 id 设为 L 的 ID

    steps:
      - 通过 fixture 创建一个叶子菜单 L
      - 携带 admin access_token 调用菜单删除接口
      - 携带 L 的 ID 调用菜单 get 接口

    assertions:
      - 删除接口返回 HTTP 200，业务码 200
      - 后续 get 接口返回失败或表示菜单不存在（具体错误形式由实现决定）
      - 列表接口中不再包含 L

    postconditions:
      - 无需额外清理（菜单已被删除）

    edge_cases:
      - 删除已不存在的 ID（不在本 case 验证）
      - 删除时数据库异常（不在本 case 验证）

    related_cases:
      - TC-MENU-006
      - TC-MENU-001

    automation:
      required: true
      target: API
      framework: pytest
      suggested_file: tests/api/test_menu_api.py
      status: planned

    regression:
      candidate: true
      tier: regression
      selection_reason:
        - newly_added_feature
      maintenance_rule: keep_until_feature_deprecated
      rationale: P1 删除 happy path，进常规 regression 套件即可。

    trace:
      change_reason: 菜单模块首次 QA 初始化，建立叶子删除基线。

  - case_id: TC-MENU-008
    title: 把菜单 parent_id 设置为自身或其后代时被拒绝
    status: draft
    priority: P0
    severity: blocker
    type: API
    module: menu
    requirement_id: REQ-MENU-MGMT
    feature_name: menu-management
    test_condition_id: COND-MENU-008
    design_technique: negative
    tags:
      - update
      - negative
      - circular-dependency
      - tree-integrity

    objective: 验证当尝试把菜单的 parent_id 修改为它自身或其后代节点时，系统应当拒绝该请求，避免菜单树成环。
    summary: >
      已认证管理员对菜单 X 调用更新接口，将其 parent_id 设置为 X 自身或 X 的后代菜单 ID 时，系统应当拒绝请求；不能允许成功，否则会破坏列表接口的递归构建。

    risk:
      likelihood: 4
      impact: 5
      level: critical
      rationale: 若未拒绝循环依赖，菜单列表接口的递归实现会无限循环导致请求挂死/服务不可用，属于服务级风险。

    preconditions:
      - 系统中存在一个具有菜单管理权限的管理员账户
      - 管理员已登录并持有有效 access_token
      - 已有 fixture 创建的两个相关菜单：父菜单 P 和挂在 P 下的子菜单 C

    test_data:
      - fixture 提供 P 与 C 的 ID
      - 子用例 A：尝试把 P 的 parent_id 改为 P 自己的 ID
      - 子用例 B：尝试把 P 的 parent_id 改为 C 的 ID（后代成为父）

    steps:
      - 通过 fixture 创建父菜单 P 与挂在其下的子菜单 C
      - 子用例 A：携带 admin access_token 调用更新接口，将 P 的 parent_id 改为 P 自己的 ID
      - 子用例 B：携带 admin access_token 调用更新接口，将 P 的 parent_id 改为 C 的 ID
      - 在每个子用例后调用列表接口，确认菜单树未成环且接口未挂死
      - 通过 get 接口确认 P 的 parent_id 未被修改为自身或后代

    assertions:
      - 子用例 A：更新接口应当拒绝（业务码非 200，或 HTTP 4xx，或 msg 含拒绝循环依赖的提示）
      - 子用例 B：更新接口应当拒绝（业务码非 200，或 HTTP 4xx，或 msg 含拒绝循环依赖的提示）
      - 列表接口在两次尝试后仍能在合理时间内（如 5s）返回，未发生递归无限循环
      - get 接口返回的 P 仍保持其原始 parent_id（即未被修改）

    postconditions:
      - 先删除 C 再删除 P 完成清理
      - 若本 case 失败（接口允许设置成环），将其作为 product issue 记录在 inspect 阶段

    edge_cases:
      - 跨多层级（P → C → GC，将 P 的 parent_id 改为 GC）— 不在本 case 直接覆盖，由 TC-MENU-008 间接揭示
      - 并发请求构造环形依赖（不在本 case 覆盖）

    related_cases:
      - TC-MENU-005
      - TC-MENU-003

    automation:
      required: true
      target: API
      framework: pytest
      suggested_file: tests/api/test_menu_api.py
      status: planned

    regression:
      candidate: true
      tier: smoke
      selection_reason:
        - critical_user_journey
        - high_risk
        - regression_prone
        - contract_boundary
      maintenance_rule: keep_until_feature_deprecated
      rationale: 服务级风险（递归无限循环可能挂死服务），必须进 smoke 套件并长期保护。

    trace:
      change_reason: 菜单模块首次 QA 初始化，建立循环依赖防护探测，预期可能暴露产品缺陷。

  - case_id: TC-MENU-E2E-001
    title: 在菜单管理页创建顶级目录后列表树立即刷新可见
    status: draft
    priority: P0
    severity: critical
    type: E2E
    module: menu
    requirement_id: REQ-MENU-MGMT
    feature_name: menu-management
    test_condition_id: COND-MENU-E2E-001
    design_technique: use_case
    tags:
      - e2e
      - happy-path
      - ui-refresh

    objective: 验证管理员在浏览器中通过菜单管理页面创建一个顶级目录菜单后，菜单列表树会自动刷新且新菜单可见。
    summary: >
      管理员登录后导航到菜单管理页面，填写新建菜单表单并提交后，页面菜单列表 UI 应立即刷新，并能够在树中看到刚刚创建的菜单。

    risk:
      likelihood: 3
      impact: 4
      level: high
      rationale: UI 列表不刷新会让管理员误以为创建失败而重复提交，造成数据污染。

    preconditions:
      - 后端服务已启动且 /api/v1/menus 接口可用
      - 前端服务已启动且 /system/menu 路由可访问
      - 管理员账户可用（默认 admin / 123456）

    test_data:
      - 一个唯一菜单名称（qa-test-e2e-{随机后缀}）
      - 唯一 path（如 /qa-test-e2e-{随机后缀}）
      - menu_type 为目录

    steps:
      - 通过 UI 用管理员账号完成登录
      - 通过 UI 导航到菜单管理页面
      - 通过 UI 触发新建菜单表单
      - 在表单中填入唯一名称、path、目录类型，并保存
      - 等待表单关闭与列表 UI 刷新
      - 在菜单列表 UI 中查找新创建的菜单

    assertions:
      - 提交后表单关闭，无错误提示
      - 菜单列表 UI 中能看到新创建的菜单名称
      - 新菜单作为顶级节点出现在列表中

    postconditions:
      - 通过 API 调用清理新创建的菜单（避免污染后续测试）

    edge_cases:
      - 网络异常时 UI 错误提示（不在本 case 验证）
      - 表单字段校验失败（不在本 case 验证）

    related_cases:
      - TC-MENU-001
      - TC-MENU-E2E-002

    automation:
      required: true
      target: E2E
      framework: pytest-playwright
      suggested_file: tests/e2e/test_menu_e2e.py
      status: planned

    regression:
      candidate: true
      tier: smoke
      selection_reason:
        - critical_user_journey
        - newly_added_feature
      maintenance_rule: keep_until_feature_deprecated
      rationale: 创建后 UI 立即刷新是管理员核心使用预期，必须进 smoke。

    trace:
      change_reason: 菜单模块首次 QA 初始化，建立创建 + UI 刷新基线。

  - case_id: TC-MENU-E2E-002
    title: 在 UI 删除有子菜单的菜单时被拒绝并保留节点
    status: draft
    priority: P1
    severity: major
    type: E2E
    module: menu
    requirement_id: REQ-MENU-MGMT
    feature_name: menu-management
    test_condition_id: COND-MENU-E2E-002
    design_technique: negative
    tags:
      - e2e
      - delete
      - business-rule
      - negative

    objective: 验证管理员在 UI 上尝试删除一个仍有子菜单的父菜单时，UI 显示拒绝提示，且该父菜单仍保留在树中。
    summary: >
      管理员在浏览器菜单管理页面对一个仍有子菜单的父菜单点击删除并确认时，UI 应给出拒绝反馈（toast/提示框），且菜单列表 UI 中父菜单及其子菜单仍存在。

    risk:
      likelihood: 3
      impact: 3
      level: medium
      rationale: 缺少 UI 反馈会让管理员误以为删除成功，可能反复尝试或转向其他破坏性操作。

    preconditions:
      - 后端服务已启动且 /api/v1/menus 接口可用
      - 前端服务已启动且 /system/menu 路由可访问
      - 已通过 API fixture 预先创建父菜单 P 和挂在其下的子菜单 C（前缀 qa-test-）

    test_data:
      - fixture 提供 P 与 C 的实际名称（用于 UI 定位）

    steps:
      - 通过 API fixture 创建父菜单 P 和子菜单 C
      - 通过 UI 用管理员账号登录
      - 通过 UI 导航到菜单管理页面
      - 在菜单树 UI 中找到父菜单 P 并触发删除操作
      - 确认删除（如有二次确认对话框）
      - 等待 UI 反馈

    assertions:
      - UI 出现可见的错误/拒绝提示（toast 或对话框文案与"无法删除"相关）
      - 菜单列表 UI 中父菜单 P 仍然可见
      - 子菜单 C 仍然挂在 P 下

    postconditions:
      - 通过 API 先删除 C 再删除 P 完成清理

    edge_cases:
      - 删除提示文案的具体内容（前端本地化差异，本 case 仅验证存在拒绝反馈）
      - 多层嵌套下的删除（不在本 case 验证）

    related_cases:
      - TC-MENU-006
      - TC-MENU-E2E-001

    automation:
      required: true
      target: E2E
      framework: pytest-playwright
      suggested_file: tests/e2e/test_menu_e2e.py
      status: planned

    regression:
      candidate: true
      tier: regression
      selection_reason:
        - high_risk
        - newly_added_feature
      maintenance_rule: keep_until_feature_deprecated
      rationale: P1 异常路径 + UI 反馈，进 regression 即可。

    trace:
      change_reason: 菜单模块首次 QA 初始化，建立 UI 删除拒绝反馈基线。

