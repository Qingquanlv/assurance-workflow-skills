name: Eval Full

on:
  schedule:
    # Weekly Sunday 02:00 UTC — workflow-full diagnostic (optional suite)
    - cron: "0 2 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval-full:
    name: workflow-full (fake OpenCode diagnostic)
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - name: Read SUT pin
        id: sut
        run: echo "pinned_sha=$(node scripts/read-sut-pin.mjs fastapi-vue-admin)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          repository: Qingquanlv/aws-bench-fastapi-vue-admin
          ref: ${{ steps.sut.outputs.pinned_sha }}
          path: sut/fastapi-vue-admin

      - name: Point eval at SUT checkout
        run: echo "EVAL_SUT_DIR=$GITHUB_WORKSPACE/sut/fastapi-vue-admin" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest + httpx
        run: pip install pytest httpx

      - name: Build CLI
        run: npm run build

      - name: Verify SUT opencode.json exists
        run: test -f "$EVAL_SUT_DIR/opencode.json"

      - name: Init SUT git repo
        run: |
          cd "$EVAL_SUT_DIR"
          git init
          git add -A
          git -c user.email=eval@ci.local -c user.name=eval-ci commit -m "eval bench seed" || true

      - name: Run workflow-full samples (fake OpenCode)
        id: run
        env:
          EVAL_USE_FAKE_OPENCODE: "1"
          OPENCODE_BIN: opencode
        run: |
          for sample in WF-001 WF-002 WF-003 WF-004; do
            echo "=== workflow-full ${sample} ==="
            run_id=$(node dist/cli.js eval run --suite workflow-full --sample "$sample" --output id)
            node dist/cli.js eval gate --run "$run_id" || true
          done
