name: Skill Review

on:
  push:
    branches: [main]
    paths:
      - "skills/**/SKILL.md"
      - ".opencode/agents/*.md"

permissions:
  contents: read
  issues: write

jobs:
  review:
    name: AI Review Changed Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed skill files
        id: diff
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD | grep -E '(skills/.*/SKILL\.md|\.opencode/agents/.*\.md)' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Changed skill files: $FILES"

      - name: Skip if no skill files changed
        if: steps.diff.outputs.files == ''
        run: |
          echo "No skill files changed, skipping review."
          exit 0

      - name: Set up Python
        if: steps.diff.outputs.files != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.diff.outputs.files != ''
        run: pip install openai

      - name: Run AI skill review
        if: steps.diff.outputs.files != ''
        id: review
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          CHANGED_FILES: ${{ steps.diff.outputs.files }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: python .github/scripts/review_skills.py

      - name: Create issue if problems found
        if: steps.diff.outputs.files != '' && steps.review.outputs.has_issues == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = process.env.ISSUE_TITLE;
            const body = process.env.ISSUE_BODY;
            const labels = ['skill-review', 'auto-generated'];

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'skill-review',
              per_page: 10,
            });

            // Avoid duplicate issues for the same commit
            const sha = process.env.COMMIT_SHA.slice(0, 7);
            const isDuplicate = existing.some(i => i.title.includes(sha));
            if (isDuplicate) {
              console.log('Issue for this commit already exists, skipping.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels,
            });
            console.log('Issue created.');
        env:
          ISSUE_TITLE: ${{ steps.review.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.review.outputs.issue_body }}
          COMMIT_SHA: ${{ github.sha }}
