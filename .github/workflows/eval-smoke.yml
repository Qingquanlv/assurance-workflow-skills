name: Eval Smoke

on:
  pull_request:
    branches: [main]
    paths:
      - "eval/**"
      - "src/eval/**"
      - "scripts/eval-*.mjs"
      - "scripts/lib/eval-*.mjs"
      - "scripts/lib/write-scan.mjs"
      - "scripts/fake-opencode-eval.mjs"
      - "skills/aws-workflow/**"
      - "skills/aws-*/**"
      - "bench/fastapi-vue-admin/opencode.json"
      - ".github/workflows/eval-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval-smoke-deterministic:
    name: eval smoke (deterministic)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Verify bench opencode.json exists
        run: test -f bench/fastapi-vue-admin/opencode.json

      - name: Run deterministic eval batch
        id: run
        run: |
          batch_id=$(node dist/cli.js eval run --plan eval/plans/pr-smoke-deterministic.json --output id)
          echo "batch_id=$batch_id" >> "$GITHUB_OUTPUT"
          node dist/cli.js eval gate --batch "$batch_id"

  eval-smoke-fake-opencode:
    name: eval smoke (fake OpenCode LLM suites)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Python (pytest collect for E2a scorer)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest + schemathesis + locust
        run: pip install pytest httpx schemathesis locust==2.32.4

      - name: Build CLI
        run: npm run build

      - name: Init bench git repo (required for write-scan)
        run: |
          cd bench/fastapi-vue-admin
          git init
          git add -A
          git -c user.email=eval@ci.local -c user.name=eval-ci commit -m "eval bench seed" || true

      - name: Run workflow-case (fake OpenCode)
        env:
          EVAL_USE_FAKE_OPENCODE: "1"
        run: |
          run_id=$(node dist/cli.js eval run --suite workflow-case --sample WC-001 --output id)
          node dist/cli.js eval gate --run "$run_id"

      - name: Run workflow-api-codegen (fake OpenCode)
        env:
          EVAL_USE_FAKE_OPENCODE: "1"
        run: |
          run_id=$(node dist/cli.js eval run --suite workflow-api-codegen --sample WAC-001 --output id)
          node dist/cli.js eval gate --run "$run_id"

      - name: Run workflow-e2e-codegen (fake OpenCode)
        env:
          EVAL_USE_FAKE_OPENCODE: "1"
        run: |
          run_id=$(node dist/cli.js eval run --suite workflow-e2e-codegen --sample WEEC-001 --output id)
          node dist/cli.js eval gate --run "$run_id"

      - name: Run workflow-fuzz-codegen (fake OpenCode)
        env:
          EVAL_USE_FAKE_OPENCODE: "1"
        run: |
          run_id=$(node dist/cli.js eval run --suite workflow-fuzz-codegen --sample WFUZ-001 --output id)
          node dist/cli.js eval gate --run "$run_id"

      - name: Run workflow-performance-codegen (fake OpenCode)
        env:
          EVAL_USE_FAKE_OPENCODE: "1"
        run: |
          run_id=$(node dist/cli.js eval run --suite workflow-performance-codegen --sample WPER-001 --output id)
          node dist/cli.js eval gate --run "$run_id"

  eval-smoke-run-e3:
    name: eval smoke (E3 workflow-run)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest + httpx
        run: pip install pytest httpx

      - name: Build CLI
        run: npm run build

      - name: Init bench git repo
        run: |
          cd bench/fastapi-vue-admin
          git init
          git add -A
          git -c user.email=eval@ci.local -c user.name=eval-ci commit -m "eval bench seed" || true

      - name: Run workflow-run sample
        env:
          OPENCODE_BIN: opencode
        run: |
          run_id=$(node dist/cli.js eval run --suite workflow-run --sample WR-001 --output id)
          node dist/cli.js eval gate --run "$run_id"
