schema_version: "1.0"
change_id: eval-sample-004
module: depts

execution_mode: inline
subagent_skill_inheritance: disabled

run_parameters:
  run_mode: case-only
  test_types: api
  run_tests: false
  auto_archive: false
  max_case_fix_attempts: 2
  max_healing_attempts: 0
  force_continue: false

subagents:
  used: false
  purpose: []
  loaded_skills: false
  attempted_skill_loading: false
  attempted_phase_execution: false
  affected_gates: false

phases:
  skill_registry_check:
    status: pass
    reason: case-only mode — only case skills required
    checked_skills:
      - aws-case-design
      - aws-case-reviewer
      - aws-case-fixer

  case_design:
    status: done
    outputs:
      - .qa.yaml
      - proposal.md
      - cases/depts/case.yaml
    self_review:
      checks_passed: 50
      errors: 0
      documented_warnings:
        - "P1 risk.level=medium for negative cases TC-DEPT-API-002/004/007/011/013 (documented in proposal.md 'Priority / Risk-Level Mismatch')"
      cases_added: 14
      cases_modified: 0
      cases_removed: 0

  case_review:
    status: pass
    gate_file: review/case-review.json
    decision: pass
    risk_level: low
    auto_fix_allowed: false
    human_review_required: false
    next_action: continue
    fix_attempts: []

  fact_baseline:
    status: done
    source: seed_file
    file: facts/fact-baseline.json
    captured_facts:
      builtin_roles: ["管理员", "普通用户"]
      default_admin: { username: "admin", password: "123456" }
      route_prefix: "/api/v1"
      token_header: "token"
      token_scheme: null
      depts_endpoints_count: 5

  layers:
    api: true
    e2e: true
    fuzz: true
    performance: true

  api_plan:
    status: pending
    outputs:
      - plans/api-plan.md
      - plans/api-test-data-plan.md
      - plans/api-codegen-plan.md

  e2e_plan:
    status: pending
    outputs:
      - plans/e2e-plan.md
      - plans/e2e-test-data-plan.md
      - plans/e2e-codegen-plan.md

  fuzz_plan:
    status: pending
    outputs:
      - plans/fuzz-plan.md
      - plans/fuzz-codegen-plan.md

  performance_plan:
    status: pending
    outputs:
      - plans/performance-plan.md
      - plans/performance-codegen-plan.md

  api_plan_review:
    status: pending
    gate_file: review/api-plan-review.json

  e2e_plan_review:
    status: pending
    gate_file: review/e2e-plan-review.json

  fuzz_plan_review:
    status: pending
    gate_file: review/fuzz-plan-review.json

  performance_plan_review:
    status: pending
    gate_file: review/performance-plan-review.json

  api_codegen:
    status: pending

  e2e_codegen:
    status: pending
    review_gate_file: review/e2e-plan-review.json

  fuzz_codegen:
    status: pending
    review_gate_file: review/fuzz-plan-review.json

  performance_codegen:
    status: pending
    review_gate_file: review/performance-plan-review.json

gates:
  healing_available: false   # max_healing_attempts == 0 → healing disabled

known_product_issues:
  - id: ANOMALY-003
    case_ids:
      - TC-DEPT-API-008
    file: known-product-issues.md
    summary: Duplicate dept create returns HTTP 500 instead of controlled rejection

agent_warnings:
  - id: OPENCODE-SKILL-RESOLUTION-001
    severity: medium
    title: OpenCode subagent skill inheritance is disabled
    impact:
      - no skill-based background subagent execution
      - workflow phases run inline in primary agent
    workaround:
      - file-based phase contracts
      - document-driven subagents only if parallelism is genuinely needed
    status: acknowledged
  - id: SKILL-TOOL-UNREGISTERED
    severity: low
    title: AWS skills loaded via on-disk SKILL.md fallback
    detail: >
      Required AWS skills are not registered with OpenCode's skill tool in this
      project; per aws-workflow Phase 0 on-disk fallback rule, SKILL.md is read
      directly from disk and followed inline. Functionally equivalent to
      `use skill <name>`.
    affected_skills:
      - aws-case-design
      - aws-case-reviewer
      - aws-case-fixer
    status: acknowledged
