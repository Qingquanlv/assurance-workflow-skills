  - case_id: TC-DEPT-API-010
    title: 更新部门 parent_id 后树形结构正确反映新归属
    status: draft
    priority: P1
    severity: critical
    type: API
    module: depts
    requirement_id: REQ-DEPT-MGMT
    feature_name: dept-management
    test_condition_id: COND-DEPT-010
    design_technique: state_transition
    tags:
      - update
      - closure
      - tree-rebuild
    objective: 验证 parent_id 变更触发 DeptClosure 重建后，list 树形结构反映新归属。
    summary: >
      预置根部门 A 与根部门 B，将 A 的 parent_id 改为 B.id 后，list 响应中
      A 应出现在 B 的 children 中，且 A 不再出现在顶层。
    risk:
      likelihood: 3
      impact: 4
      level: high
      rationale: 闭包表重建是部门模块最易出错的副作用，残留旧关系会导致树渲染异常。
    preconditions:
      - 后端服务可用
      - 已获取有效管理员 token
      - 已预置两个根部门 A 与 B（不同唯一 name）并记录各自 id
    test_data:
      - 创建根部门 A（parent_id=0，唯一 name）
      - 创建根部门 B（parent_id=0，唯一 name）
    steps:
      - 创建 A 与 B，分别获取 A.id 与 B.id
      - 携带有效 admin token 调用 部门更新接口，body 含 id=A.id、name=A.name、parent_id=B.id、order=0
      - 调用 部门列表接口
      - 检查树形结构
    assertions:
      - update 返回 HTTP 200 且业务码 code 为 200
      - list 响应 data 顶层节点不包含 id 为 A.id 的节点
      - list 响应 data 顶层节点包含 id 为 B.id 的节点
      - B 节点的 children 列表包含 id 为 A.id 的节点
      - A 子节点的 parent_id 等于 B.id
    postconditions:
      - 依次软删除部门 A 与部门 B（注意删除顺序与 closure 影响）
    edge_cases:
      - 将子部门移回 parent_id=0（变根）
      - 形成环依赖（A 移到自己后代下，应被业务拒绝；本轮不强制断言）
    related_cases:
      - TC-DEPT-API-006
      - TC-DEPT-API-009
    automation:
      required: true
      framework: pytest
      suggested_file: tests/api/test_dept_api.py
      status: planned
      confirmed_by: user
      confirmed_at: "2026-06-22T04:27:04Z"
    regression:
      candidate: true
      tier: regression
      selection_reason:
        - regression_prone
        - high_risk
      maintenance_rule: keep_until_feature_deprecated
      rationale: closure 重建历史易回归，列入常规回归。
    trace:
      change_reason: 新增部门模块 API 基线覆盖

