schema_version: "1.0"

added:
  - case_id: TC-DEPT-API-001
    title: 管理员可获取部门树形列表
    status: draft
    priority: P0
    severity: critical
    type: API
    module: depts
    requirement_id: REQ-DEPT-MGMT
    feature_name: dept-management
    test_condition_id: COND-DEPT-001
    design_technique: use_case
    tags:
      - list
      - happy-path
      - tree
    objective: 验证已登录管理员调用部门列表接口时，系统返回完整树形结构与成功业务码。
    summary: >
      已登录管理员调用 部门列表接口 时，系统应返回 HTTP 200 与业务码 200，
      响应 data 为嵌套含 children 的部门树。
    risk:
      likelihood: 3
      impact: 4
      level: high
      rationale: 列表是部门管理所有后续操作的入口，失败会阻断整个模块的运营。
    preconditions:
      - 后端服务可用
      - 系统中存在至少一个部门（可为种子数据或测试新建）
      - 已获取有效管理员 token
    test_data:
      - 使用 api_client fixture（已携带 admin token）
      - 可选：通过 create 接口预置一个带唯一前缀的部门以确保非空
    steps:
      - 携带有效 admin token 发起 部门列表接口 请求
      - 查看响应状态码与响应体
    assertions:
      - 接口返回 HTTP 200
      - 响应业务码 code 为 200
      - 响应体 data 为列表（可为空或包含节点）
      - 若 data 非空，节点至少包含 id、name、desc、order、parent_id、children 六个字段
    postconditions:
      - 本 case 不修改任何部门数据
      - 不需要清理
    edge_cases:
      - 系统初始无部门时 data 为空列表
      - 部门数量极多时性能（属 Performance layer，本轮不覆盖）
    related_cases:
      - TC-DEPT-API-002
      - TC-DEPT-API-005
      - TC-DEPT-API-006
    automation:
      required: true
      framework: pytest
      suggested_file: tests/api/test_dept_api.py
      status: planned
      confirmed_by: user
      confirmed_at: "2026-06-22T04:27:04Z"
    regression:
      candidate: true
      tier: smoke
      selection_reason:
        - critical_user_journey
      maintenance_rule: keep_until_feature_deprecated
      rationale: P0 happy-path 列表查询是部门模块入口，归入 smoke。
    trace:
      change_reason: 新增部门模块 API 基线覆盖

  - case_id: TC-DEPT-API-002
    title: 部门列表按 name 模糊搜索可正确过滤
    status: draft
    priority: P1
    severity: major
    type: API
    module: depts
    requirement_id: REQ-DEPT-MGMT
    feature_name: dept-management
    test_condition_id: COND-DEPT-002
    design_technique: equivalence_partitioning
    tags:
      - list
      - search
      - filter
    objective: 验证 name 查询参数对部门列表的模糊匹配过滤行为。
    summary: >
      调用 部门列表接口（按 name 模糊查询） 时，响应 data 应仅包含 name 包含
      该关键词的部门节点。
    risk:
      likelihood: 3
      impact: 3
      level: medium
      rationale: 搜索过滤错误会让用户找不到部门，影响管理效率但不阻塞核心流程。
    preconditions:
      - 后端服务可用
      - 系统中存在至少两个 name 可区分的部门（含目标关键词 / 不含）
      - 已获取有效管理员 token
    test_data:
      - 通过 create 接口预置两个部门，其中一个 name 含唯一关键词（如 qa-dept-<token>-match），另一个不含
      - 使用 api_client fixture
    steps:
      - 携带有效 admin token 发起 部门列表接口（按 name 模糊查询，使用唯一关键词） 请求
      - 查看响应体
    assertions:
      - 接口返回 HTTP 200
      - 响应业务码 code 为 200
      - 响应 data 中所有节点的 name 均包含该关键词
      - 不含关键词的预置部门不出现在 data 中
    postconditions:
      - 清理本 case 创建的两个部门（软删除）
    edge_cases:
      - name 参数为空字符串等价于不过滤
      - 关键词不匹配任何部门时返回空列表
    related_cases:
      - TC-DEPT-API-001
    automation:
      required: true
      framework: pytest
      suggested_file: tests/api/test_dept_api.py
      status: planned
      confirmed_by: user
      confirmed_at: "2026-06-22T04:27:04Z"
    regression:
      candidate: true
      tier: regression
      selection_reason:
        - contract_boundary
      maintenance_rule: keep_until_feature_deprecated
      rationale: P1 过滤行为属于常规回归覆盖，不进 smoke。
    trace:
      change_reason: 新增部门模块 API 基线覆盖

  - case_id: TC-DEPT-API-003
    title: 通过 id 获取已存在部门详情
    status: draft
    priority: P0
    severity: critical
    type: API
    module: depts
    requirement_id: REQ-DEPT-MGMT
    feature_name: dept-management
    test_condition_id: COND-DEPT-003
    design_technique: use_case
    tags:
      - get
      - happy-path
    objective: 验证通过有效 id 获取部门详情时返回完整字段。
    summary: >
      调用 部门详情接口（按已存在的 id） 应返回 HTTP 200 与业务码 200，
      响应 data 包含该部门的完整字段。
    risk:
      likelihood: 3
      impact: 4
      level: high
      rationale: 详情查询是更新前的关键步骤，失败会阻断更新流程。
    preconditions:
      - 后端服务可用
      - 已通过 create 接口预置一个部门并记录其 id
      - 已获取有效管理员 token
    test_data:
      - 通过 create 接口预置一个唯一 name 的根部门
      - 记录返回或通过 list 查到的 id
    steps:
      - 携带有效 admin token 调用 部门详情接口（按已存在的 id）
      - 查看响应体
    assertions:
      - 接口返回 HTTP 200
      - 响应业务码 code 为 200
      - 响应 data 中 id 等于请求 id
      - 响应 data 中 name 等于创建时的 name
      - 响应 data 至少包含 id、name、desc、order、parent_id 字段
    postconditions:
      - 清理本 case 创建的部门（软删除）
    edge_cases:
      - id 为已软删除的部门（本轮不覆盖，留到后续）
    related_cases:
      - TC-DEPT-API-004
      - TC-DEPT-API-005
    automation:
      required: true
      framework: pytest
      suggested_file: tests/api/test_dept_api.py
      status: planned
      confirmed_by: user
      confirmed_at: "2026-06-22T04:27:04Z"
    regression:
      candidate: true
      tier: smoke
      selection_reason:
        - critical_user_journey
      maintenance_rule: keep_until_feature_deprecated
      rationale: P0 详情读取是核心契约，归入 smoke。
    trace:
      change_reason: 新增部门模块 API 基线覆盖

  - case_id: TC-DEPT-API-004
    title: 获取不存在的部门 id 应被优雅拒绝
    status: draft
    priority: P1
    severity: major
    type: API
    module: depts
    requirement_id: REQ-DEPT-MGMT
    feature_name: dept-management
    test_condition_id: COND-DEPT-004
    design_technique: negative
    tags:
      - get
      - negative
    objective: 验证 get 接口面对不存在 id 时返回受控错误，而非 5xx 未捕获异常。
    summary: >
      调用 部门详情接口（按不存在的 id） 时，系统应返回非 2xx 状态码或
      业务码非 200，且不允许返回 5xx 未捕获异常。
    risk:
      likelihood: 3
      impact: 3
      level: medium
      rationale: 未捕获异常会暴露内部堆栈并阻断前端容错。
    preconditions:
      - 后端服务可用
      - 已获取有效管理员 token
      - 选定一个不存在的 id（如 99999999）
    test_data:
      - 使用 api_client fixture
      - 选用一个明显不可能存在的整型 id
    steps:
      - 携带有效 admin token 调用 部门详情接口（按不存在的 id，如 99999999）
      - 查看响应状态码、业务码与响应体
    assertions:
      - 响应状态码不是 5xx
      - 响应满足以下任一：HTTP 状态码非 2xx 或业务体 code 非 200
      - 响应体包含可读错误信息（msg / detail 字段非空）
    postconditions:
      - 无需清理（未创建任何资源）
    edge_cases:
      - id 为已软删除的部门
      - id 为非整型（参数校验层，本轮不覆盖）
    related_cases:
      - TC-DEPT-API-003
    automation:
      required: true
      framework: pytest
      suggested_file: tests/api/test_dept_api.py
      status: planned
      confirmed_by: user
      confirmed_at: "2026-06-22T04:27:04Z"
    regression:
      candidate: true
      tier: regression
      selection_reason:
        - contract_boundary
      maintenance_rule: keep_until_feature_deprecated
      rationale: P1 negative 行为列入常规回归。
    trace:
      change_reason: 新增部门模块 API 基线覆盖

  - case_id: TC-DEPT-API-005
    title: 创建根部门后可在列表中查到
    status: draft
    priority: P0
    severity: blocker
    type: API
    module: depts
    requirement_id: REQ-DEPT-MGMT
    feature_name: dept-management
    test_condition_id: COND-DEPT-005
    design_technique: use_case
    tags:
      - create
      - happy-path
      - root
    objective: 验证以 parent_id=0 创建根部门后，新部门在树形列表的顶层出现。
    summary: >
      调用 部门创建接口（parent_id=0）应返回 HTTP 200 与业务码 200，
      随后调用 部门列表接口 应在顶层节点中找到新部门。
    risk:
      likelihood: 3
      impact: 5
      level: critical
      rationale: 创建是写入路径的入口，失败导致整个模块不可用。
    preconditions:
      - 后端服务可用
      - 已获取有效管理员 token
      - 选定一个未被使用的唯一 name 前缀（如 qa-dept-<token>-root）
    test_data:
      - 使用 api_client fixture
      - 构造 name 为唯一前缀字符串，desc 任意，order=0，parent_id=0
    steps:
      - 携带有效 admin token 调用 部门创建接口，body 含 name / desc / order / parent_id=0
      - 调用 部门列表接口
      - 在树形 data 顶层节点中查找匹配 name 的节点
    assertions:
      - create 接口返回 HTTP 200
      - create 响应业务码 code 为 200
      - 后续 list 响应业务码 code 为 200
      - list 响应 data 顶层节点中存在 name 等于新建 name 的节点
      - 该节点 parent_id 等于 0
    postconditions:
      - 清理本 case 创建的根部门（软删除）
    edge_cases:
      - name 为空字符串（schema 层校验，本轮不覆盖）
      - name 超过 20 字符（boundary，留待 Fuzz layer）
    related_cases:
      - TC-DEPT-API-001
      - TC-DEPT-API-006
      - TC-DEPT-API-008
      - TC-DEPT-API-012
    automation:
      required: true
      framework: pytest
      suggested_file: tests/api/test_dept_api.py
      status: planned
      confirmed_by: user
      confirmed_at: "2026-06-22T04:27:04Z"
    regression:
      candidate: true
      tier: smoke
      selection_reason:
        - critical_user_journey
      maintenance_rule: keep_until_feature_deprecated
      rationale: P0 写入路径核心 happy path，归入 smoke。
    trace:
      change_reason: 新增部门模块 API 基线覆盖

  - case_id: TC-DEPT-API-006
    title: 基于已存在父部门创建子部门
    status: draft
    priority: P0
    severity: critical
    type: API
    module: depts
    requirement_id: REQ-DEPT-MGMT
    feature_name: dept-management
    test_condition_id: COND-DEPT-006
    design_technique: state_transition
    tags:
      - create
      - happy-path
      - child
      - closure
    objective: 验证子部门创建后通过 list 接口可在父节点的 children 中找到。
    summary: >
      先创建根部门 A，再以 parent_id=A.id 创建子部门 B，list 响应中 A 节点的
      children 列表应包含 B；DeptClosure 关系链应同步建立（通过列表树形外部观察）。
    risk:
      likelihood: 3
      impact: 4
      level: high
      rationale: 子部门 closure 缺失会让前端树渲染缺节点。
    preconditions:
      - 后端服务可用
      - 已获取有效管理员 token
    test_data:
      - 先调用 create 创建根部门 A（parent_id=0，唯一 name）
      - 通过 list 获取 A.id
      - 构造子部门 name（唯一前缀 + "-child"）
    steps:
      - 创建根部门 A 并通过 list 获取 A.id
      - 携带有效 admin token 调用 部门创建接口，body 含 name=B、parent_id=A.id
      - 调用 部门列表接口
      - 在树形 data 中找到 A，并检查其 children
    assertions:
      - 子部门 create 接口返回 HTTP 200 且业务码 code 为 200
      - list 响应中存在 id 为 A.id 的根节点
      - 该根节点 children 列表中存在 name 等于 B.name 的节点
      - 该子节点 parent_id 等于 A.id
    postconditions:
      - 依次软删除子部门 B 与根部门 A
    edge_cases:
      - 多层嵌套（>2 层）
    related_cases:
      - TC-DEPT-API-005
      - TC-DEPT-API-007
      - TC-DEPT-API-010
    automation:
      required: true
      framework: pytest
      suggested_file: tests/api/test_dept_api.py
      status: planned
      confirmed_by: user
      confirmed_at: "2026-06-22T04:27:04Z"
    regression:
      candidate: true
      tier: smoke
      selection_reason:
        - critical_user_journey
      maintenance_rule: keep_until_feature_deprecated
      rationale: 子部门 + closure 是部门模块的关键状态转换，归入 smoke。
    trace:
      change_reason: 新增部门模块 API 基线覆盖

  - case_id: TC-DEPT-API-007
    title: 创建子部门时父 id 不存在应被优雅拒绝
    status: draft
    priority: P1
    severity: major
    type: API
    module: depts
    requirement_id: REQ-DEPT-MGMT
    feature_name: dept-management
    test_condition_id: COND-DEPT-007
    design_technique: negative
    tags:
      - create
      - negative
    objective: 验证 create 接口对不存在的 parent_id 返回受控错误而非 5xx。
    summary: >
      调用 部门创建接口，parent_id 设为不存在的 id（如 99999999），
      系统应返回非 2xx 状态码或业务码非 200，不允许返回 5xx 未捕获异常。
    risk:
      likelihood: 3
      impact: 3
      level: medium
      rationale: 错误的父引用必须在写入前被拦截，否则会污染 closure 表。
    preconditions:
      - 后端服务可用
      - 已获取有效管理员 token
      - 选定一个不存在的 id（如 99999999）
    test_data:
      - 使用 api_client fixture
      - 构造 body：name 唯一前缀，parent_id=99999999
    steps:
      - 携带有效 admin token 调用 部门创建接口，parent_id=不存在的 id
      - 查看响应状态码与业务码
      - 调用 部门列表接口 检查是否误创建
    assertions:
      - 响应状态码不是 5xx
      - 响应满足以下任一：HTTP 状态码非 2xx 或业务体 code 非 200
      - list 响应中不存在 name 等于本次构造 name 的节点（未发生误创建）
    postconditions:
      - 若意外创建了部门则软删除清理
    edge_cases:
      - parent_id 为负数
    related_cases:
      - TC-DEPT-API-006
    automation:
      required: true
      framework: pytest
      suggested_file: tests/api/test_dept_api.py
      status: planned
      confirmed_by: user
      confirmed_at: "2026-06-22T04:27:04Z"
    regression:
      candidate: true
      tier: regression
      selection_reason:
        - contract_boundary
      maintenance_rule: keep_until_feature_deprecated
      rationale: P1 写入路径 negative，归入常规回归。
    trace:
      change_reason: 新增部门模块 API 基线覆盖

  - case_id: TC-DEPT-API-008
    title: 同名部门重复创建应被唯一约束拒绝
    status: draft
    priority: P1
    severity: critical
    type: API
    module: depts
    requirement_id: REQ-DEPT-MGMT
    feature_name: dept-management
    test_condition_id: COND-DEPT-008
    design_technique: negative
    tags:
      - create
      - negative
      - unique
    objective: 验证部门 name 唯一约束生效（ORM 层 unique=True）。
    summary: >
      首次以唯一 name 创建部门成功后，再次使用相同 name 调用 create 应被系统拒绝，
      响应非 2xx 或业务码非 200。
    risk:
      likelihood: 4
      impact: 3
      level: high
      rationale: 唯一约束失效会引入数据混乱与前端展示歧义。
    preconditions:
      - 后端服务可用
      - 已获取有效管理员 token
    test_data:
      - 构造唯一 name（如 qa-dept-<token>-dup）
      - 使用 api_client fixture
    steps:
      - 第一次调用 部门创建接口，body 含构造的 name、parent_id=0
      - 检查首次响应成功
      - 第二次使用完全相同的 body 再调用 部门创建接口
      - 查看第二次响应状态码、业务码与响应体
    assertions:
      - 首次 create 返回 HTTP 200 且业务码 code 为 200
      - 第二次 create 响应状态码不是 5xx
      - 第二次 create 满足以下任一：HTTP 状态码非 2xx 或业务体 code 非 200
      - 第二次响应体包含可读错误信息
    postconditions:
      - 软删除首次创建的部门
    edge_cases:
      - 大小写不同的同名（数据库 collation 决定，本轮不展开断言）
    related_cases:
      - TC-DEPT-API-005
    automation:
      required: true
      framework: pytest
      suggested_file: tests/api/test_dept_api.py
      status: planned
      confirmed_by: user
      confirmed_at: "2026-06-22T04:27:04Z"
    regression:
      candidate: true
      tier: regression
      selection_reason:
        - contract_boundary
        - high_risk
      maintenance_rule: keep_until_feature_deprecated
      rationale: 唯一约束属于数据完整性边界，列入回归。
    trace:
      change_reason: 新增部门模块 API 基线覆盖

  - case_id: TC-DEPT-API-009
    title: 更新已存在部门的基础字段
    status: draft
    priority: P0
    severity: critical
    type: API
    module: depts
    requirement_id: REQ-DEPT-MGMT
    feature_name: dept-management
    test_condition_id: COND-DEPT-009
    design_technique: use_case
    tags:
      - update
      - happy-path
    objective: 验证 update 接口可以修改 name / desc / order 三类基础字段。
    summary: >
      预置一个部门后，调用 部门更新接口 修改其 name 与 desc，
      再通过 get 验证新值生效。
    risk:
      likelihood: 3
      impact: 4
      level: high
      rationale: 更新失败会让管理员无法维护组织信息。
    preconditions:
      - 后端服务可用
      - 已获取有效管理员 token
      - 已通过 create 接口预置一个根部门并记录 id
    test_data:
      - 创建根部门 A（唯一 name + 唯一 desc）
      - 构造新 name（A.name + "-updated"）与新 desc
    steps:
      - 创建根部门 A 并获取 id
      - 携带有效 admin token 调用 部门更新接口，body 含 id、新 name、新 desc、原 order、原 parent_id
      - 调用 部门详情接口（按 id=A.id）
      - 查看响应
    assertions:
      - update 返回 HTTP 200 且业务码 code 为 200
      - get 响应业务码 code 为 200
      - get 响应 data.name 等于新 name
      - get 响应 data.desc 等于新 desc
      - get 响应 data.id 等于 A.id
    postconditions:
      - 软删除部门 A
    edge_cases:
      - 仅修改 desc 不动 name
    related_cases:
      - TC-DEPT-API-010
      - TC-DEPT-API-011
    automation:
      required: true
