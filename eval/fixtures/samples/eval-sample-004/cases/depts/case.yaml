  - case_id: TC-DEPT-API-014
    title: 未鉴权调用部门接口返回 401
    status: draft
    priority: P1
    severity: critical
    type: API
    module: depts
    requirement_id: REQ-DEPT-MGMT
    feature_name: dept-management
    test_condition_id: COND-DEPT-014
    design_technique: negative
    tags:
      - auth
      - security
      - negative
    objective: 验证部门路由挂载在 DependPermission 之下，无 token 访问被拒绝。
    summary: >
      使用未携带 token 的客户端调用 部门列表接口，系统应返回 HTTP 401
      或等价的鉴权拒绝响应（业务码体现未授权），并不返回 5xx。
    risk:
      likelihood: 3
      impact: 5
      level: critical
      rationale: 部门接口暴露组织架构数据，鉴权失效是安全合规问题。
    preconditions:
      - 后端服务可用
      - 构造一个不携带 token 的 httpx 客户端（与 api_client 不同）
    test_data:
      - 构造未鉴权 httpx 客户端，base_url 复用 backend base url，不设置 token header
    steps:
      - 使用未鉴权客户端调用 部门列表接口
      - 查看响应状态码与响应体
    assertions:
      - 响应状态码不是 5xx
      - 响应满足以下任一：HTTP 状态码为 401 或业务体 code 表示未授权（非 200）
      - 响应体不暴露内部堆栈或敏感字段
    postconditions:
      - 无需清理（未创建任何资源）
    edge_cases:
      - 携带过期 token（本轮不覆盖）
      - 携带格式错误 token（本轮不覆盖）
    related_cases:
