  endpoints:
    dept:
      list:
        method: GET
        path: /api/v1/dept/list
        params: name (optional query param for search)
        auth: required (token header)
        response_200: "tree structure with id, name, desc, order, parent_id, children"
        source: app/api/v1/depts/depts.py
      get:
        method: GET
        path: /api/v1/dept/get
        params: id (query param, required)
        auth: required (token header)
        response_200: "dept fields: id, name, desc, order, parent_id"
        source: app/api/v1/depts/depts.py
      create:
        method: POST
        path: /api/v1/dept/create
        body: "{name: str (required), desc: str, order: int, parent_id: int}"
        auth: required (token header)
        response_200: '{code: 200, msg: "Created Successfully"}'
        source: app/api/v1/depts/depts.py
      update:
        method: POST
        path: /api/v1/dept/update
        body: "{id: int (required), name: str, desc: str, order: int, parent_id: int}"
        auth: required (token header)
        response_200: '{code: 200, msg: "Update Successfully"}'
        source: app/api/v1/depts/depts.py
      delete:
        method: DELETE
        path: /api/v1/dept/delete
        params: dept_id (query param, required)
        auth: required (token header)
        response_200: '{code: 200, msg: "Deleted Success"}'
        source: app/api/v1/depts/depts.py

    role:
      list:
        method: GET
        path: /api/v1/role/list
        params: "page (int, default 1), page_size (int, default 10), role_name (optional)"
        auth: required (token header)
        response_200: '{code: 200, msg: "OK", data: [...], total, page, page_size}'
        source: app/api/v1/roles/roles.py
      get:
        method: GET
        path: /api/v1/role/get
        params: role_id (query param, required)
        auth: required (token header)
        response_200: '{code: 200, data: {id, name, desc, created_at, updated_at}}'
        source: app/api/v1/roles/roles.py
      create:
        method: POST
        path: /api/v1/role/create
        body: '{name: str (required, unique), desc: str (optional)}'
        auth: required (token header)
        response_200: '{code: 200, msg: "Created Successfully"}'
        error_400: 'Duplicate name -> {code: 400, msg: "The role with this rolename already exists in the system."}'
        source: app/api/v1/roles/roles.py
      update:
        method: POST
        path: /api/v1/role/update
        body: '{id: int (required), name: str, desc: str}'
        auth: required (token header)
        response_200: '{code: 200, msg: "Updated Successfully"}'
        source: app/api/v1/roles/roles.py
      delete:
        method: DELETE
        path: /api/v1/role/delete
        params: role_id (query param, required)
        auth: required (token header)
        response_200: '{code: 200, msg: "Deleted Success"}'
        source: app/api/v1/roles/roles.py
      authorized_get:
        method: GET
        path: /api/v1/role/authorized
        params: id (query param, required)
        auth: required (token header)
        response_200: '{code: 200, data: {menus: [...], apis: [...]}}'
        source: app/api/v1/roles/roles.py
      authorized_post:
        method: POST
        path: /api/v1/role/authorized
        body: '{id: int, menu_ids: [int], api_infos: [{path, method}]}'
        auth: required (token header)
        response_200: '{code: 200, msg: "Updated Successfully"}'
        note: "Clear+add semantics: existing menu/api links are wiped before re-bind. Unknown api paths silently ignored."
        source: app/api/v1/roles/roles.py
        controller: app/controllers/role.py update_roles

    menu:
      list:
        method: GET
        path: /api/v1/menus/list
        params: "page (int, default 1), page_size (int, default 10)"
        auth: required (token header)
        response_200: '{code: 200, data: [tree of menus with children: [...]], total, page, page_size}'
        note: "Returns hierarchical tree (parent menus include children). No name/path filter param. No search."
        source: app/api/v1/menus/menus.py
      get:
        method: GET
        path: /api/v1/menus/get
        params: menu_id (query param, required)
        auth: required (token header)
        response_200: '{code: 200, data: {id, name, path, menu_type, parent_id, component, order, icon, is_hidden, keepalive, redirect, children: [...]}}'
        note: "ANOMALY-002: get_menu_with_children has no visited-set; circular parent_id chain triggers infinite recursion."
        source: app/api/v1/menus/menus.py
      create:
        method: POST
        path: /api/v1/menus/create
        body: '{name: str, path: str, menu_type: "catalog"|"menu", parent_id: int (default 0), component: str (default "Layout"), order: int (default 100), icon: str, is_hidden: bool, keepalive: bool, redirect: str}'
        auth: required (token header)
        response_200: '{code: 200, msg: "Created Successfully"}'
        source: app/api/v1/menus/menus.py
      update:
        method: POST
        path: /api/v1/menus/update
        body: '{id: int (required), name, path, menu_type, parent_id, component (NO default — must be sent), order, icon, is_hidden, keepalive, redirect}'
        auth: required (token header)
        response_200: '{code: 200, msg: "Updated Successfully"}'
        note: "ANOMALY-002 ROOT CAUSE: update_menu has NO parent_id self-reference / cycle guard; setting parent_id=id or creating any cycle is currently accepted by the API."
        source: app/api/v1/menus/menus.py
      delete:
        method: DELETE
        path: /api/v1/menus/delete
        params: id (query param, required — NOT menu_id)
        auth: required (token header)
        response_200: '{code: 200, msg: "Deleted Success"}'
        error_business: '{code: 4000, msg: "Cannot delete a menu with child menus"} when menu has children (HTTP 200, business code 4000 via Fail())'
        source: app/api/v1/menus/menus.py

  schemas:
    dept:
      DeptCreate:
        fields:
          name: {type: str, required: true, max_length: null, note: "max_length=20 enforced at DB/ORM level only, NOT in Pydantic schema"}
          desc: {type: str, required: false, default: '""'}
          order: {type: int, required: false, default: 0}
          parent_id: {type: int, required: false, default: 0}
        source: app/schemas/depts.py

      DeptUpdate:
        extends: DeptCreate
        additional_fields:
          id: {type: int, required: true}
        source: app/schemas/depts.py

    role:
      RoleCreate:
        fields:
          name: {type: str, required: true, note: "unique; duplicate -> HTTP 400"}
          desc: {type: str, required: false}
        source: app/schemas/roles.py
      RoleUpdate:
        extends: RoleCreate
        additional_fields:
          id: {type: int, required: true}
        source: app/schemas/roles.py
      RoleUpdateMenusApis:
        fields:
          id: {type: int, required: true}
          menu_ids: {type: "list[int]", required: true}
          api_infos: {type: "list[{path: str, method: str}]", required: true}
        source: app/schemas/roles.py

    menu:
      MenuCreate:
        fields:
          name: {type: str, required: true}
          path: {type: str, required: true}
          menu_type: {type: '"catalog"|"menu"', required: true, note: "MenuType enum"}
          parent_id: {type: int, required: false, default: 0}
          component: {type: str, required: false, default: '"Layout"'}
          order: {type: int, required: false, default: 100}
          icon: {type: str, required: false, default: '""'}
          is_hidden: {type: bool, required: false, default: false}
          keepalive: {type: bool, required: false, default: true}
          redirect: {type: str, required: false, default: '""'}
        source: app/schemas/menus.py

      MenuUpdate:
        fields:
          id: {type: int, required: true}
          name: {type: str, required: true}
          path: {type: str, required: true}
          menu_type: {type: '"catalog"|"menu"', required: true}
          parent_id: {type: int, required: true, note: "no Pydantic default — must be echoed"}
          component: {type: str, required: true, note: "NO Pydantic default — every update must send full payload; see read_then_update helper"}
          order: {type: int, required: true}
          icon: {type: str, required: false, default: '""'}
          is_hidden: {type: bool, required: false, default: false}
          keepalive: {type: bool, required: false, default: true}
          redirect: {type: str, required: false, default: '""'}
        source: app/schemas/menus.py

  routes:
    e2e:
      login: /login
      dept_management: /system/dept
      role_management: /system/role
      menu_management: /system/menu
      sidebar_nav: "系统管理 → 部门管理 / 角色管理 / 菜单管理"

  execution:
    api:
      command: "uv run pytest tests/api/test_dept_api.py tests/api/test_role_api.py -v"
      timeout_seconds: 30
      headed: false
    e2e:
      command: "uv run pytest tests/e2e/test_dept_management_e2e.py tests/e2e/test_role_management_e2e.py -v --headed"
      timeout_seconds: 60
      headed: true

discovered_candidates:
  - name: base_url
    source: tests/api/conftest.py
    confidence: high
  - name: admin_token
    source: tests/api/conftest.py
    confidence: high
  - name: api_client
    source: tests/api/conftest.py
