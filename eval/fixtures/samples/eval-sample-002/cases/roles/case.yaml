      - 调用 /role/delete 传入该 role_id
      - 通过 /role/get 验证该角色已不存在
    assertions:
      - delete 接口返回 HTTP 200
      - 响应消息为「Deleted Success」
      - 随后 /role/get 返回 HTTP 404
    postconditions:
