    feature_name: role-authorized
    test_condition_id: COND-ROLES-012
    design_technique: state_transition
    tags: [authorized, happy-path, rbac]
    objective: 验证授权写入 (POST /role/authorized) 后通过 GET /role/authorized 能读出最终绑定状态。
    summary: >
      管理员对测试角色提交 menu_ids 与 api_infos 后，再次查询授权应返回相同的最终绑定集合（clear+add 语义）。
    risk:
      likelihood: 4
      impact: 5
      level: critical
      rationale: 授权绑定是 RBAC 核心，失败将导致权限失控。
    preconditions:
      - 已登录获取 token
      - 测试角色已存在，可被授权
      - seed 菜单与 API 数据已初始化
    test_data:
      - 通过创建 fixture 准备测试角色
      - 从 GET /menu/list 选取一组 menu_id
      - 从 GET /api/list 选取一组 api 三元组 (path, method, tags 或对应字段)
    steps:
      - 以管理员身份登录
      - 创建临时测试角色
      - 调用 POST /role/authorized 提交一组 menu_ids 与 api_infos
      - 调用 GET /role/authorized 查询该角色权限
      - 比较返回的 menus / apis 集合与提交内容
    assertions:
      - POST 接口返回 HTTP 200，响应消息为「Updated Successfully」
      - GET 接口返回 HTTP 200
      - GET 响应中的 menus 列表 id 集合等于提交的 menu_ids 集合
      - GET 响应中的 apis 列表条目与提交的 api_infos 集合等价（clear+add 语义，无残留旧绑定）
    postconditions:
      - 测试结束清理测试角色
    edge_cases:
      - 提交空 menu_ids 与 api_infos 清空所有授权
      - 重复提交相同授权应保持幂等
    related_cases:
      - TC-ROLES-E2E-004
    automation:
      required: true
      framework: pytest
      suggested_file: tests/api/test_roles_api.py
      status: planned
      confirmed_by: user
      confirmed_at: "2026-06-15T08:00:00Z"
    regression:
      candidate: true
      tier: smoke
      selection_reason: [critical_user_journey, security_related]
      maintenance_rule: keep_until_feature_deprecated
      rationale: 授权链路是 RBAC 安全核心，必须列入冒烟。
    trace:
      related_requirements: [REQ-ROLES-006]

