schema_version: "1.0"

added:
  # ─────────────────────────── API CASES ────────────────────────────
  - case_id: TC-ROLES-API-001
    title: 管理员可分页获取角色列表
    status: draft
    priority: P0
    severity: critical
    type: API
    module: roles
    requirement_id: REQ-ROLES-001
    feature_name: role-list
    test_condition_id: COND-ROLES-001
    design_technique: use_case
    tags: [list, pagination, happy-path]
    objective: 验证管理员调用角色列表接口时，能按默认分页获取角色集合及总数。
    summary: >
      管理员携带有效 token 调用角色列表接口，返回符合分页约定的数据集合与 total 字段。
    risk:
      likelihood: 4
      impact: 4
      level: high
      rationale: 列表接口是前端进入角色管理页的第一交互，失败将导致整页不可用。
    preconditions:
      - 系统已初始化，至少存在 seed 角色「管理员」「普通用户」
      - 测试客户端已使用 admin 账户完成登录并获取有效 access_token
    test_data:
      - 使用默认 seed 角色无需额外构造
      - 通过 admin/123456 登录拿到 token
    steps:
      - 以管理员身份登录获取 access_token
      - 携带有效 token 调用角色列表接口，使用默认分页参数
      - 查看响应体
    assertions:
      - 接口返回 HTTP 200
      - 响应业务码为 200
      - 响应包含 total 字段，且 total ≥ 2
      - 响应 data 为数组，每个元素包含 id、name、desc 字段
    postconditions:
      - 测试完成不修改任何角色数据
    edge_cases:
      - 自定义 page / page_size 分页
      - 大于实际页数的分页请求
    related_cases:
      - TC-ROLES-API-002
    automation:
      required: true
      framework: pytest
      suggested_file: tests/api/test_roles_api.py
      status: planned
      confirmed_by: user
      confirmed_at: "2026-06-15T08:00:00Z"
    regression:
      candidate: true
      tier: smoke
      selection_reason: [critical_user_journey]
      maintenance_rule: keep_until_feature_deprecated
      rationale: 角色列表是角色管理模块入口，必须列入冒烟。
    trace:
      related_requirements: [REQ-ROLES-001]
      change_reason: 新建角色管理 API 全量覆盖

  - case_id: TC-ROLES-API-002
    title: 按 role_name 模糊搜索角色列表
    status: draft
    priority: P1
    severity: major
    type: API
    module: roles
    requirement_id: REQ-ROLES-001
    feature_name: role-list-search
    test_condition_id: COND-ROLES-002
    design_technique: equivalence_partitioning
    tags: [list, search]
    objective: 验证传入 role_name 关键词时，列表返回仅包含名称匹配的角色。
    summary: >
      管理员使用 role_name 关键词调用角色列表接口，应仅返回名称包含该关键词的角色集合。
    risk:
      likelihood: 3
      impact: 3
      level: medium
      rationale: 搜索功能用户高频使用，但故障可降级为浏览全量列表。
    preconditions:
      - 系统中存在至少两个角色，其中之一名称包含 seed 关键词
      - 已获得 admin 账户 token
    test_data:
      - 默认 seed 角色 (「管理员」「普通用户」) 已存在
    steps:
      - 以管理员身份登录获取 token
      - 调用角色列表接口，传入 role_name 关键词「管理」
      - 查看响应中的 data 列表
    assertions:
      - 接口返回 HTTP 200
      - 响应业务码为 200
      - data 列表中每个角色的 name 字段都包含关键词「管理」
    postconditions:
      - 不修改任何角色数据
    edge_cases:
      - role_name 关键词无匹配时返回空列表
      - role_name 关键词包含特殊字符
    related_cases:
      - TC-ROLES-API-001
    automation:
      required: true
      framework: pytest
      suggested_file: tests/api/test_roles_api.py
      status: planned
      confirmed_by: user
      confirmed_at: "2026-06-15T08:00:00Z"
    regression:
      candidate: true
      tier: regression
      selection_reason: [critical_user_journey]
      maintenance_rule: keep_until_feature_deprecated
      rationale: 搜索为常用查询场景，列入回归。
    trace:
      related_requirements: [REQ-ROLES-001]

  - case_id: TC-ROLES-API-003
    title: 未携带 token 访问角色列表返回 401
    status: draft
    priority: P0
    severity: critical
    type: API
    module: roles
    requirement_id: REQ-ROLES-001
    feature_name: role-list-auth
    test_condition_id: COND-ROLES-003
    design_technique: negative
    tags: [auth, negative]
    objective: 验证未登录时调用角色列表接口被认证中间件拒绝。
    summary: >
      不携带 Authorization header 调用角色列表接口，应被认证中间件拒绝并返回 401。
    risk:
      likelihood: 4
      impact: 5
      level: critical
      rationale: 未鉴权暴露角色信息属于严重安全风险。
    preconditions:
      - 测试客户端不持有任何 token
    test_data:
      - 无
    steps:
      - 不携带 Authorization header 调用角色列表接口
      - 查看响应状态码与错误体
    assertions:
      - 接口返回 HTTP 401
      - 响应业务码或 detail 指示未授权
    postconditions:
      - 不修改任何角色数据
    edge_cases:
      - 携带过期 token
      - 携带格式错误的 token
    related_cases:
      - TC-ROLES-API-001
    automation:
      required: true
      framework: pytest
      suggested_file: tests/api/test_roles_api.py
      status: planned
      confirmed_by: user
      confirmed_at: "2026-06-15T08:00:00Z"
    regression:
      candidate: true
      tier: smoke
      selection_reason: [security_related, critical_user_journey]
      maintenance_rule: keep_until_feature_deprecated
      rationale: 鉴权边界必须列入冒烟。
    trace:
      related_requirements: [REQ-ROLES-001]

  - case_id: TC-ROLES-API-004
    title: 按 id 获取单个角色详情
    status: draft
    priority: P0
    severity: critical
    type: API
    module: roles
    requirement_id: REQ-ROLES-002
    feature_name: role-get
    test_condition_id: COND-ROLES-004
    design_technique: use_case
    tags: [get, happy-path]
    objective: 验证按 role_id 查询单个角色时返回完整角色信息。
    summary: >
      使用合法 role_id 调用 /role/get，应返回包含 id、name、desc 的角色详情。
    risk:
      likelihood: 3
      impact: 4
      level: high
      rationale: 详情接口为编辑入口提供初始数据，失败将阻断编辑流程。
    preconditions:
      - 系统存在 seed 角色「管理员」(id=1)
      - 已登录获取 token
    test_data:
      - seed 角色 id=1
    steps:
      - 以管理员身份登录获取 token
      - 调用 /role/get 传入 role_id=1
      - 查看响应数据
    assertions:
      - 接口返回 HTTP 200
      - 响应业务码为 200
      - data.id 等于 1
      - data.name 为「管理员」
    postconditions:
      - 不修改角色数据
    edge_cases:
      - role_id 为字符串
      - role_id 缺失
    related_cases:
      - TC-ROLES-API-005
    automation:
      required: true
      framework: pytest
      suggested_file: tests/api/test_roles_api.py
      status: planned
      confirmed_by: user
      confirmed_at: "2026-06-15T08:00:00Z"
    regression:
      candidate: true
      tier: smoke
      selection_reason: [critical_user_journey]
      maintenance_rule: keep_until_feature_deprecated
      rationale: 单条查询是编辑流程前置依赖。
    trace:
      related_requirements: [REQ-ROLES-002]

  - case_id: TC-ROLES-API-005
