      suggested_file: tests/api/test_roles_api.py
      status: planned
      confirmed_by: user
      confirmed_at: "2026-06-15T08:00:00Z"
    regression:
      candidate: true
      tier: regression
      selection_reason: [contract_boundary]
      maintenance_rule: keep_until_feature_deprecated
      rationale: 负向边界覆盖。
    trace:
      related_requirements: [REQ-ROLES-002]

  - case_id: TC-ROLES-API-006
    title: 创建唯一名称角色成功
    status: draft
    priority: P0
    severity: critical
    type: API
    module: roles
    requirement_id: REQ-ROLES-003
    feature_name: role-create
    test_condition_id: COND-ROLES-006
    design_technique: use_case
    tags: [create, happy-path]
    objective: 验证使用全新角色名调用 /role/create 时角色被成功创建。
    summary: >
      管理员使用唯一 name 调用 /role/create，系统应创建角色并返回成功响应。
    risk:
      likelihood: 4
      impact: 4
      level: high
      rationale: 创建是 RBAC 体系的源头操作，失败将无法扩展角色。
    preconditions:
      - 已登录获取 token
      - 待创建的角色名在系统中不存在
    test_data:
      - 测试脚本生成的唯一名称，如「测试角色-<timestamp>」
      - 描述字段「自动化测试创建的角色」
    steps:
      - 以管理员身份登录
      - 调用 /role/create，传入唯一的 name 与 desc
      - 查看响应
      - 通过 /role/list 验证新角色出现在列表中
    assertions:
      - 接口返回 HTTP 200
      - 响应业务码为 200
      - 响应消息为「Created Successfully」
      - 后续列表查询能查询到该角色
    postconditions:
      - 测试结束后删除该角色以清理
    edge_cases:
      - name 包含特殊字符
      - desc 为空
    related_cases:
      - TC-ROLES-API-007
    automation:
      required: true
      framework: pytest
      suggested_file: tests/api/test_roles_api.py
      status: planned
      confirmed_by: user
      confirmed_at: "2026-06-15T08:00:00Z"
    regression:
      candidate: true
      tier: smoke
      selection_reason: [critical_user_journey]
      maintenance_rule: keep_until_feature_deprecated
      rationale: 角色创建是 CRUD 入口。
    trace:
      related_requirements: [REQ-ROLES-003]

  - case_id: TC-ROLES-API-007
    title: 创建重名角色返回 400
    status: draft
    priority: P0
    severity: critical
    type: API
    module: roles
    requirement_id: REQ-ROLES-003
    feature_name: role-create-duplicate
    test_condition_id: COND-ROLES-007
    design_technique: negative
    tags: [create, negative, validation]
    objective: 验证使用已存在的角色名创建角色被业务层拒绝。
    summary: >
      管理员使用已存在的 name 调用 /role/create，应返回 HTTP 400 并提示角色已存在。
    risk:
      likelihood: 4
      impact: 4
      level: high
      rationale: 重名校验失效会破坏 RBAC 唯一性约束。
    preconditions:
      - 系统中已存在 seed 角色「管理员」
      - 已登录获取 token
    test_data:
      - 与 seed 角色重名的 name=「管理员」
    steps:
      - 以管理员身份登录
      - 调用 /role/create 传入 name=「管理员」
      - 查看响应
    assertions:
      - 接口返回 HTTP 400
      - 响应 detail 提示角色已存在（包含 "already exists" 关键词）
    postconditions:
      - 不创建新角色
    edge_cases: []
    related_cases:
      - TC-ROLES-API-006
    automation:
      required: true
      framework: pytest
      suggested_file: tests/api/test_roles_api.py
      status: planned
      confirmed_by: user
      confirmed_at: "2026-06-15T08:00:00Z"
    regression:
      candidate: true
      tier: regression
      selection_reason: [contract_boundary]
      maintenance_rule: keep_until_feature_deprecated
      rationale: 唯一性约束需常态保障。
    trace:
      related_requirements: [REQ-ROLES-003]

  - case_id: TC-ROLES-API-008
    title: 更新已存在角色成功
    status: draft
    priority: P0
    severity: critical
    type: API
    module: roles
    requirement_id: REQ-ROLES-004
    feature_name: role-update
    test_condition_id: COND-ROLES-008
    design_technique: use_case
    tags: [update, happy-path]
    objective: 验证管理员使用合法 id 更新角色信息时数据持久化。
    summary: >
      管理员调用 /role/update 修改测试角色的 name 与 desc，应返回成功并通过列表确认变更。
    risk:
      likelihood: 4
      impact: 4
      level: high
      rationale: 更新失败会阻断角色维护流程。
    preconditions:
      - 已登录获取 token
      - 已创建测试角色，并知其 id
    test_data:
      - 通过创建 fixture 准备测试角色及 id
      - 新 name = 唯一字符串；新 desc = 「更新后描述」
    steps:
      - 以管理员身份登录
      - 创建一个临时角色作为更新目标
      - 调用 /role/update 传入新 name 与 desc
      - 通过 /role/get 验证字段已更新
    assertions:
      - update 接口返回 HTTP 200
      - 响应消息为「Updated Successfully」
      - 后续 /role/get 返回的 name 与 desc 等于更新值
    postconditions:
      - 测试结束清理该测试角色
    edge_cases:
      - desc 留空
    related_cases:
      - TC-ROLES-API-009
    automation:
      required: true
      framework: pytest
      suggested_file: tests/api/test_roles_api.py
      status: planned
      confirmed_by: user
      confirmed_at: "2026-06-15T08:00:00Z"
    regression:
      candidate: true
      tier: smoke
      selection_reason: [critical_user_journey]
      maintenance_rule: keep_until_feature_deprecated
      rationale: 更新是日常维护核心操作。
    trace:
      related_requirements: [REQ-ROLES-004]

