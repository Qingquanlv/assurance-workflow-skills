name: L3-run-seed-fuzz-dept
extends: L2-fuzz-codegen-seed-dept
description: Run eval seed — depts fuzz tests generated, ready for aws run
paths:
  - "tests/__init__.py"
  - "tests/fuzz/__init__.py"
  - "tests/fuzz/test_dept_fuzz.py"
resets:
  workflow_state:
    phases.fuzz_codegen.status: done
    phases.execution.status: pending
  qa_yaml:
    test_types: [fuzz]
