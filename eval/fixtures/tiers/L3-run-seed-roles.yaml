name: L3-run-seed-roles
extends: L2-api-codegen-seed-roles
description: Run eval seed — roles API tests generated, ready for aws run
paths:
  - "tests/__init__.py"
  - "tests/api/__init__.py"
  - "tests/api/conftest.py"
  - "tests/api/test_role_api.py"
  - "tests/api/helpers/__init__.py"
  - "tests/api/helpers/auth.py"
  - "tests/api/helpers/role_api.py"
resets:
  workflow_state:
    phases.api_codegen.status: done
    phases.execution.status: pending
  qa_yaml:
    test_types: [api]
