name: L3-run-seed-fuzz
extends: L2-fuzz-codegen-seed
description: Run eval seed — users fuzz tests generated, ready for aws run
paths:
  - "tests/__init__.py"
  - "tests/fuzz/__init__.py"
  - "tests/fuzz/test_users_fuzz.py"
resets:
  workflow_state:
    phases.fuzz_codegen.status: done
    phases.execution.status: pending
  qa_yaml:
    test_types: [fuzz]
