change_id: eval-sample-001
title: 用户管理模块 QA 全量覆盖
module: users
created_at: '2026-06-12'
created_by: sisyphus
status: in_progress
phase: case_design
scope:
  summary: 对 app/api/v1/users/ 用户管理模块进行 API + E2E 全量覆盖，含 CRUD、角色分配、密码重置
  in_scope:
    - GET /api/v1/user/list 用户列表（分页、按 username/email/dept_id 搜索）
    - GET /api/v1/user/get 查询单个用户
    - POST /api/v1/user/create 创建用户（含 role_ids 关联）
    - POST /api/v1/user/update 更新用户（含 role_ids 重写）
    - DELETE /api/v1/user/delete 删除用户
    - POST /api/v1/user/reset_password 重置密码（含超级管理员 403 防护）
    - /system/user 前端用户管理页：列表/新建/编辑/删除/分配角色/登录前置
  out_of_scope:
    - 更新自身密码（PUT /base/update_password 接口属于 base 模块）
    - 用户头像上传
    - 部门管理 / 菜单管理 / API 管理 / 角色管理本身的 CRUD
    - 系统初始化与数据库迁移
test_types:
  - api
automation:
  api_framework: pytest
  e2e_framework: python-playwright
  data_strategy: scripts_with_cleanup
constraints:
  exception_depth: standard
  e2e_pages:
    - /system/user
  include_reset_password: true
  default_admin:
    username: admin
    password: '123456'
  base_url_backend: http://localhost:9999
  base_url_frontend: http://localhost:3100
  api_prefix: /api/v1
runtime_params:
  run_mode: codegen-only
  run_tests: false
  auto_archive: false
  max_case_fix_attempts: 2
  max_plan_fix_attempts: 2
  max_healing_attempts: 0
  force_continue: false
artifacts:
  proposal: proposal.md
  case_delta: cases/users/case.yaml
  facts_baseline: facts/fact-baseline.json
  api_plan: plans/api-plan.md
  e2e_plan: plans/e2e-plan.md
  case_review: review/case-review.json
  api_plan_review: review/api-plan-review.json
  e2e_plan_review: review/plan-review.json
  api_result: execution/api-result.json
  e2e_result: execution/e2e-result.json
