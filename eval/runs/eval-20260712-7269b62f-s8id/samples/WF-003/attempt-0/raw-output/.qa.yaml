change_id: "eval-sample-003"
title: "菜单管理模块 QA 全量覆盖"
module: "menus"
created_at: "2026-06-14"
created_by: "sisyphus"
status: "in_progress"
phase: "case_design"

scope:
  summary: "对 app/api/v1/menus/ 菜单管理模块进行 API + E2E 全量覆盖，含树形 CRUD"
  in_scope:
    - "GET /api/v1/menus/list 菜单树形列表"
    - "GET /api/v1/menus/get 查询单个菜单"
    - "POST /api/v1/menus/create 创建菜单（根/子）"
    - "POST /api/v1/menus/update 更新菜单"
    - "DELETE /api/v1/menus/delete 删除菜单（含子节点约束）"
    - "/system/menu 前端菜单管理页：树形列表/新建/编辑/删除"
  out_of_scope:
    - "角色授权绑定"
    - "用户管理 / 部门管理 / API 管理本身的 CRUD"
    - "parent_id 循环引用异常回归"

test_types:
  - "api"
  - "e2e"

automation:
  api_framework: "pytest"
  e2e_framework: "python-playwright"
  data_strategy: "scripts_with_cleanup"

constraints:
  exception_depth: "standard"
  e2e_pages: ["/system/menu"]
  default_admin: { username: "admin", password: "123456" }
  base_url_backend: "http://localhost:9999"
  base_url_frontend: "http://localhost:3100"
  api_prefix: "/api/v1"

runtime_params:
  run_mode: "full"
  run_tests: true
  auto_archive: false
  max_case_fix_attempts: 2
  max_plan_fix_attempts: 2
  max_healing_attempts: 2
  force_continue: false

artifacts:
  proposal: "proposal.md"
  case_delta: "cases/menus/case.yaml"
  facts_baseline: "facts/fact-baseline.json"
  case_review: "review/case-review.json"
