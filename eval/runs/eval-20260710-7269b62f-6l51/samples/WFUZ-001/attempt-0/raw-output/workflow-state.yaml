      - aws-inspect
      - aws-archive
      - aws-fix-proposal
      - aws-api-codegen-fixer
      - aws-e2e-codegen-fixer
    status: acknowledged
  - id: AWS-CONFIG-LAYOUT-MISMATCH
    severity: low
    title: .aws/config.yaml sources point to non-existent directories
    detail: |
      .aws/config.yaml has sources.frontend=./frontend and sources.backend=./backend but actual project layout is web/ (frontend) and app/ (backend). Workflow uses actual paths; config can be updated separately.
    status: acknowledged
  - id: AWS-ORCHESTRATION-SHADOW-UNAVAILABLE
    severity: low
    phase: phase-0
    command: aws status
    error: schema missing (workflow-schema.yaml not found in .aws/ or docs/design/)
    action_taken: continued_with_prose_workflow
    status: recorded
  - id: AWS-CODEGEN-INFRA-MISSING
    severity: medium
    phase: phase-7a
    title: .aws/data-knowledge.yaml + api-codegen-plan assumed conftest/helpers exist; reality is greenfield
    detail: |
      api-codegen-plan.md says tests/api/conftest.py and helpers/{auth,user_api,role_api}.py are EXISTING with confidence: high in data-knowledge.yaml. On-disk inspection shows tests/api/ contains only .gitkeep. data-knowledge.yaml was likely populated from data-knowledge.proposal.yaml without filesystem verification.
    action_taken: bootstrap_infra_inline
    rationale: |
      User authorized inline bootstrap (Phase 7A scope expansion). Codegen will emit conftest.py + helpers/*.py from scratch using fixture contracts in data-knowledge.yaml as the spec. Same approach for E2E in Phase 7B.
    affected_files:
      - tests/api/conftest.py
      - tests/api/helpers/__init__.py
      - tests/api/helpers/auth.py
      - tests/api/helpers/user_api.py
      - tests/api/helpers/role_api.py
      - tests/e2e/conftest.py
      - tests/e2e/scripts/__init__.py
      - tests/e2e/scripts/user_data_setup.py
      - tests/e2e/scripts/role_data_setup.py
    status: acknowledged
  - id: AWS-CODEGEN-ORM-VERIFY-DECISION
    severity: low
    phase: phase-7a
    title: ORM verification reformulated as API roundtrip verification
    detail: |
      api-plan.md asserts ORM-side state (e.g., User.filter(...).exists()) for several cases. tortoise-orm is async; pytest-asyncio is NOT in dependencies; initializing Tortoise inside the test process from sync code requires non-trivial bootstrap.
    action_taken: api_roundtrip_verification
    rationale: |
      Replace direct ORM checks with secondary API calls (GET /user/list?username=... with m2m=True; GET /user/get?user_id=...). Functionally equivalent for assertions: existence, role binding, password not leaked. Avoids async/sync impedance and the pattern matches data-knowledge "no new fixtures" rule.
    affected_cases:
      - TC-USER-020
      - TC-USER-021
      - TC-USER-022
      - TC-USER-030
      - TC-USER-031
      - TC-USER-040
    status: acknowledged
