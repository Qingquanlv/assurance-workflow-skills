    severity: medium
    title: OpenCode subagent skill inheritance is disabled
    impact:
      - no skill-based background subagent execution
      - workflow phases run inline
    workaround:
      - use file-based phase contracts
      - use document-driven subagents only if parallelism is needed
    status: acknowledged
  - id: SKILL-TOOL-UNREGISTERED
    severity: low
    title: AWS skills exist on disk but not registered with skill tool
    detail: |
      All 17 required AWS skills were found on disk under /Users/lvqingquan/skills/assurance-workflow-skills/skills/<name>/SKILL.md but the skill tool only exposes project-local skills. The workflow reads SKILL.md directly as an equivalent fallback.
    affected_skills:
      - aws-case-design
      - aws-case-reviewer
      - aws-case-fixer
      - aws-api-plan
      - aws-e2e-plan
      - aws-api-plan-reviewer
