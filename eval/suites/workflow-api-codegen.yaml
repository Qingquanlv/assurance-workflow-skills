name: workflow-api-codegen
version: "1.0.0"

executor:
  type: workflow-run
  run_mode: codegen-only
  test_types: api
  run_tests: false
  timeout_seconds: 7200
  expected_outputs:
    - "{{attempt.dir}}/raw-output/plans/api-plan.md"

dataset: workflow-api-codegen

thresholds:
  schema_valid_rate: ">= 0.99"
  collection_success_rate: ">= 0.95"
  test_executable_rate: ">= 0.95"
  secret_leak_count: "== 0"
  forbidden_write_executed_count: "== 0"
  target_file_coverage_rate: ">= 0.95"

hard_gates:
  - evidence_integrity
  - schema_valid_rate
  - collection_success_rate
  - test_executable_rate
  - secret_leak_count
  - forbidden_write_executed_count

ci:
  pr:
    enabled: true
    mode: smoke
    required: true
    max_samples: 1
    trigger_paths:
      - "skills/aws-api-codegen/**"
      - "scripts/eval-workflow-run.mjs"
