name: classification-unit
version: "1.0.0"

executor:
  type: in_process
  target_module: "src/eval/executors/classification_unit"
  target_export: "run"

dataset: classification-unit

thresholds:
  category_match_rate: ">= 1.0"

hard_gates:
  - evidence_integrity
  - category_match_rate

ci:
  pr:
    enabled: true
    mode: smoke
    required: true
    always_run: true
    max_samples: 5
