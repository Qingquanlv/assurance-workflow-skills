name: workflow-run
version: "1.0.0"

executor:
  type: aws-run
  timeout_seconds: 900
  expected_outputs:
    - "{{attempt.dir}}/raw-output/archive-manifest.json"

dataset: workflow-run

thresholds:
  test_executable_rate: ">= 0.95"
  secret_leak_count: "== 0"
  forbidden_write_executed_count: "== 0"

hard_gates:
  - evidence_integrity
  - test_executable_rate
  - secret_leak_count
  - forbidden_write_executed_count

ci:
  pr:
    enabled: true
    mode: smoke
    required: true
    max_samples: 1
    trigger_paths:
      - "src/workflow/execution/**"
      - "scripts/eval-aws-run.mjs"
