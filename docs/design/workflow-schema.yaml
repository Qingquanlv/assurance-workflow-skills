# =============================================================================
# AWS Workflow Schema — DRAFT (design only, not yet wired to the CLI)
# =============================================================================
#
# Purpose
#   Express the AWS phase graph as DATA instead of 2244 lines of prose in
#   skills/aws-workflow/SKILL.md. A deterministic engine in the `aws` CLI reads
#   this file to answer two questions:
#     1. "What phase is allowed to run next?"      → aws status
#     2. "Has this phase's gate passed?"           → aws gate check
#
# Design lineage
#   Borrowed from OpenSpec OPSX (schema.yaml + topological-sort graph engine +
#   filesystem state detection). Extended with a `gate` verdict layer that
#   OpenSpec deliberately omits ("dependencies are enablers, not gates").
#
#   Key difference from OpenSpec:
#     OpenSpec  done := produces files EXIST
#     AWS       done := produces files EXIST  AND  gate verdict == pass
#
#   The LLM does the work (design/review/codegen). The CLI owns routing and
#   gate adjudication. The LLM never decides "can I advance" — it asks the CLI.
# =============================================================================

schema_version: "0.1-draft"
name: aws-full

# -----------------------------------------------------------------------------
# Runtime parameters that shape the graph.
# Supplied at `aws status` time (from workflow-state.yaml params block).
# Phases whose `when` predicate is false are PRUNED from the graph entirely.
# -----------------------------------------------------------------------------
params:
  run_mode:            { type: enum,  values: [full, case-only, api-only, e2e-only, plan-only, codegen-only, review-case, review-plan], default: full }
  test_types:          { type: list,  values: [api, e2e], default: [api, e2e] }
  run_tests:           { type: bool,  default: true }
  max_case_fix_attempts: { type: int, default: 2 }
  max_plan_fix_attempts: { type: int, default: 2 }
  max_healing_attempts:  { type: int, default: 2 }
  auto_archive:        { type: bool,  default: false }

# -----------------------------------------------------------------------------
# Phase nodes. Each is a DAG node.
#   requires  : enabler dependencies — phase is BLOCKED until all are `done`
#   produces  : artifact paths whose existence is checked for state detection
#   gate      : id of a gate in the `gates:` section (optional). If set, phase
#               is only `done` when produces-exist AND that gate passes.
#   when      : predicate over params; if false the phase is pruned
#   loop      : healing loop membership (see `loops:` section)
# Paths are relative to qa/changes/<change-id>/ unless prefixed.
# -----------------------------------------------------------------------------
phases:
  - id: skill-registry-check
    skill: null                       # Phase 0: orchestrator-internal
    requires: []
    produces: [workflow-state.yaml]
    gate: registry-gate

  - id: risk-advisory
    skill: aws-risk-advisory
    requires: [skill-registry-check]
    produces: [risk-advisory/context.json]
    when: "params.run_mode in ['full', 'case-only']"
    # Phase 0.5: CLI aws risk context + skill; see docs/design/2026-06-19-risk-advisory-spec.md

  - id: case-design
    skill: aws-case-design
    requires: [skill-registry-check]
    produces: [cases/]
    when: "params.run_mode in ['full', 'case-only', 'plan-only', 'codegen-only', 'review-case', 'review-plan']"
    # Phase 1 prose gate: read phases.risk_advisory when present (see risk-advisory spec §3.2)

  - id: case-review
    skill: aws-case-reviewer
    requires: [case-design]
    produces: [review/case-review.json]
    gate: case-review-gate

  # case-fix is a conditional repair node, not on the happy path.
  # It runs only when case-review-gate yields needs_fix; bounded by attempts.
  - id: case-fix
    skill: aws-case-fixer
    requires: [case-review]
    produces: [review/case-review.json]   # fixer triggers a fresh review
    when: "gate('case-review-gate').verdict == 'needs_fix'"
    repair_of: case-review
    max_attempts_param: max_case_fix_attempts

  # ---- API branch -----------------------------------------------------------
  - id: api-plan
    skill: aws-api-plan
    requires: [case-review]           # gated: case-review must be `done`(=pass)
    produces: [plans/api-plan.md, plans/api-test-data-plan.md, plans/api-codegen-plan.md]
    when: "'api' in params.test_types and params.run_mode in ['full', 'api-only', 'plan-only', 'codegen-only', 'review-plan']"

  - id: api-plan-review
    skill: aws-api-plan-reviewer
    requires: [api-plan]
    produces: [review/api-plan-review.json]
    gate: api-plan-review-gate
    when: "'api' in params.test_types"

  - id: api-plan-fix
    skill: aws-api-plan-fixer
    requires: [api-plan-review]
    produces: [review/api-plan-review.json]
    when: "'api' in params.test_types and gate('api-plan-review-gate').verdict == 'needs_fix'"
    repair_of: api-plan-review
    max_attempts_param: max_plan_fix_attempts

  - id: api-codegen
    skill: aws-api-codegen
    requires: [api-plan-review]       # gated: review must be `done`(=pass+ready)
    produces: [codegen/api-codegen-summary.md]
    gate: api-codegen-precondition-gate
    when: "'api' in params.test_types and params.run_mode in ['full', 'api-only', 'codegen-only']"

  # ---- E2E branch -----------------------------------------------------------
  - id: e2e-plan
    skill: aws-e2e-plan
    requires: [case-review]
    produces: [plans/e2e-plan.md, plans/e2e-codegen-plan.md]
    when: "'e2e' in params.test_types and params.run_mode in ['full', 'e2e-only', 'plan-only', 'codegen-only', 'review-plan']"

  - id: e2e-plan-review
    skill: aws-e2e-plan-reviewer
    requires: [e2e-plan]
    produces: [review/plan-review.json]
    gate: e2e-plan-review-gate
    when: "'e2e' in params.test_types"

  - id: e2e-plan-fix
    skill: aws-e2e-plan-fixer
    requires: [e2e-plan-review]
    produces: [review/plan-review.json]
    when: "'e2e' in params.test_types and gate('e2e-plan-review-gate').verdict == 'needs_fix'"
    repair_of: e2e-plan-review
    max_attempts_param: max_plan_fix_attempts

  - id: e2e-codegen
    skill: aws-e2e-codegen
    requires: [e2e-plan-review]
    produces: [codegen/e2e-codegen-summary.md]
    gate: e2e-codegen-precondition-gate
    when: "'e2e' in params.test_types and params.run_mode in ['full', 'e2e-only', 'codegen-only']"

  # ---- Execution + inspect --------------------------------------------------
  - id: execution
    skill: aws-run
    # requires the codegen phase(s) that are active in this run
    requires: [api-codegen, e2e-codegen]   # engine drops pruned deps
    requires_mode: any_active              # at least one active dep must be done
    produces: [execution/execution-manifest.yaml]
    when: "params.run_tests == true and params.run_mode in ['full', 'api-only', 'e2e-only', 'codegen-only']"

  - id: inspect
    skill: aws-inspect
    requires: [execution]
    produces: [inspect/failure-analysis.json, inspect/inspect-safety-check.json]
    gate: inspect-safety-gate

  # ---- Healing loop (Phases 10-13) ------------------------------------------
  # Entire loop pruned unless healing is needed AND available.
  - id: fix-proposal
    skill: aws-fix-proposal
    requires: [inspect]
    produces: [healing/fix-proposal.json]
    when: "gate('healing-entry-gate').verdict == 'enter'"
    loop: healing

  - id: api-codegen-fix
    skill: aws-api-codegen-fixer
    requires: [fix-proposal]
    produces: [healing/api-apply-summary.json]
    when: "any(fix_proposal.proposals, target == 'api' and eligible == true)"
    loop: healing

  - id: e2e-codegen-fix
    skill: aws-e2e-codegen-fixer
    requires: [fix-proposal]
    produces: [healing/e2e-apply-summary.json]
    when: "any(fix_proposal.proposals, target == 'e2e' and eligible == true)"
    loop: healing

  - id: healing-rerun
    skill: aws-run
    requires: [api-codegen-fix, e2e-codegen-fix]
    requires_mode: any_active
    produces: [execution/execution-manifest.yaml]   # must carry a NEW batch_id
    gate: fixer-safety-gate                          # checked before rerun
    loop: healing

  - id: healing-reinspect
    skill: aws-inspect
    requires: [healing-rerun]
    produces: [inspect/failure-analysis.json, inspect/inspect-safety-check.json]
    gate: inspect-safety-gate
    loop: healing
    # loop-back / exit adjudicated by healing-loop-gate (see loops:)

  # ---- Archive --------------------------------------------------------------
  - id: archive
    skill: aws-archive
    requires: [inspect]               # plus healing terminal state (see gate)
    produces: ["qa/archive/<change-id>/"]
    gate: archive-gate
    when: "params.auto_archive == true or params.run_mode == 'full'"

# -----------------------------------------------------------------------------
# Loops. The engine treats a loop as a sub-graph that may repeat.
# -----------------------------------------------------------------------------
loops:
  healing:
    members: [fix-proposal, api-codegen-fix, e2e-codegen-fix, healing-rerun, healing-reinspect]
    counter: state.phases.healing.attempts     # length = attempts consumed
    max_param: max_healing_attempts
    # attempt is ALLOCATED when fix-proposal produces eligible_count > 0
    allocate_on: "file_exists('healing/fix-proposal.json') and fix_proposal.summary.eligible_count > 0"
    exit_gate: healing-loop-gate

# -----------------------------------------------------------------------------
# Gates — the verdict layer OpenSpec does not have.
# Each gate is PURE: reads named JSON/state, returns a verdict. No LLM.
# `aws gate check --phase <id>` resolves the phase's `gate:` here.
# Verdict vocabulary: pass | needs_fix | needs_human_review | reject | stop
#                     | enter | exit | continue   (loop gates)
# -----------------------------------------------------------------------------
gates:
  registry-gate:
    reads: [workflow-state.yaml]
    pass_when: "state.phases.skill_registry_check.status == 'pass'"
    stop_when: "state.phases.skill_registry_check.status == 'fail'"

  case-review-gate:
    reads: [review/case-review.json]
    invalid_json: stop
    missing_field_is: stop
    pass_when:               "decision == 'pass'"
    needs_fix_when:          "decision == 'needs_fix' and auto_fix_allowed == true"
    needs_human_review_when: "decision == 'needs_human_review' or human_review_required == true"
    reject_when:             "decision == 'reject'"

  api-plan-review-gate: &plan-review-gate
    reads: [review/api-plan-review.json]
    invalid_json: stop
    missing_field_is: stop
    pass_when:               "decision == 'pass' and codegen_readiness in ['ready','ready_with_warnings']"
    needs_fix_when:          "decision == 'needs_fix' and auto_fix_allowed == true"
    needs_human_review_when: "human_review_required == true or risk_level in ['high','critical']"
    reject_when:             "decision == 'reject' or codegen_readiness == 'not_ready'"

  e2e-plan-review-gate:
    <<: *plan-review-gate
    reads: [review/plan-review.json]

  # Hard precondition before codegen — independent of the review verdict.
  api-codegen-precondition-gate:
    reads: [workflow-state.yaml]
    pass_when: "gate('api-plan-review-gate').verdict == 'pass' and file_exists('repo:.aws/data-knowledge.yaml')"
    stop_when: "not file_exists('repo:.aws/data-knowledge.yaml')"

  e2e-codegen-precondition-gate:
    reads: [workflow-state.yaml]
    pass_when: "gate('e2e-plan-review-gate').verdict == 'pass' and file_exists('repo:.aws/data-knowledge.yaml')"
    stop_when: "not file_exists('repo:.aws/data-knowledge.yaml')"

  inspect-safety-gate:
    reads: [inspect/inspect-safety-check.json]
    missing_file_is: stop                       # evidence file is MANDATORY
    pass_when: "passed == true and len(forbidden_modified_files) == 0"
    stop_when: "passed == false or len(forbidden_modified_files) > 0"

  fixer-safety-gate:
    reads: [healing/fixer-safety-check.json]
    missing_file_is: stop                       # evidence file is MANDATORY
    pass_when: >
      passed == true
      and product_code_modified == false
      and assertion_expected_value_changes_detected == false
      and skip_or_xfail_added == false
      and unrelated_tests_modified == false
      and high_risk_proposal_applied == false
    stop_when: "passed == false"

  healing-entry-gate:
    reads: [workflow-state.yaml, inspect/failure-analysis.json]
    # enter the healing loop only when all conditions hold
    enter_when: >
      state.phases.execution.status == 'FAIL'
      and any(failure_analysis.failures, fix_proposal_eligible == true)
      and state.phases.inspect.inspect_mode == 'primary'
      and state.gates.healing_available == true
      and len(state.phases.healing.attempts) < params.max_healing_attempts
    stop_when: >
      state.phases.execution.status == 'FAIL'
      and any(failure_analysis.failures, fix_proposal_eligible == true)
      and state.gates.healing_available == false
    skip_when: >
      state.phases.execution.status in ['PASS','PASS_WITH_WARNINGS']
      or not any(failure_analysis.failures, fix_proposal_eligible == true)

  healing-loop-gate:
    reads: [workflow-state.yaml, inspect/failure-analysis.json]
    # adjudicates loop-back vs exit after healing-reinspect.
    # NOTE: '#' is NOT a comment inside a `>` block scalar — keep annotations
    # on their own comment lines, never inline within a predicate value.
    # exit    → healing.status = resolved
    # continue → loop back to fix-proposal
    # stop    → healing.status = exhausted
    exit_when: >
      state.phases.execution.status in ['PASS','PASS_WITH_WARNINGS']
    continue_when: >
      state.phases.execution.status == 'FAIL'
      and any(failure_analysis.failures, fix_proposal_eligible == true)
      and len(state.phases.healing.attempts) < params.max_healing_attempts
    stop_when: >
      len(state.phases.healing.attempts) >= params.max_healing_attempts
      or state.phases.healing.all_fixers_no_op == true

  archive-gate:
    reads:
      - workflow-state.yaml
      - inspect/failure-analysis.json
      - inspect/inspect-safety-check.json
      - healing/fixer-safety-check.json   # only when healing ran
      - review/case-review.json
      - review/api-plan-review.json        # if api tested
      - review/plan-review.json            # if e2e tested
    pass_when: >
      (params.auto_archive == true or state.user_requested_archive == true)
      and case_review.decision == 'pass'
      and (not ('api' in params.test_types) or api_plan_review.decision == 'pass')
      and (not ('e2e' in params.test_types) or plan_review.decision == 'pass')
      and state.phases.execution.status in ['PASS','PASS_WITH_WARNINGS']
      and state.phases.healing.status in ['not_needed','resolved','skipped']
      and failure_analysis.source_batch_id == state.phases.execution.batch_id
      and not any(failure_analysis.failures, fix_proposal_eligible == true)
      and inspect_safety_check.passed == true
      and (state.phases.healing.status != 'resolved' or fixer_safety_check.passed == true)
    stop_when: >
      state.phases.execution.status == 'FAIL'
      or state.phases.healing.status in ['applied','exhausted','failed']
      or failure_analysis.source_batch_id != state.phases.execution.batch_id
      or inspect_safety_check.passed != true
